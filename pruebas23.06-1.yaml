components:
  schemas:
    AcceptedResponse:
      type: object
      properties:
        message:
          type: string
          description: >-
            Mensaje que confirma que la solicitud fue recibida y será procesada
            de forma asíncrona.
          example: Solicitud recibida y procesando
      required:
        - message
    UnauthorizedResponse:
      type: object
      description: Respuesta del gateway cuando la API key es ausente o invalida.
      properties:
        message:
          type: string
          description: Mensaje que indica el motivo del error de autenticación.
          example: Unauthorized
        request_id:
          type: string
          description: Identificador único de la solicitud.
          example: fd49b7506711ab474ebb396eb7d07c45
      required:
        - message
        - request_id
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          description: Código HTTP del error.
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: >-
            Mensaje descriptivo del error. Puede ser un string para errores de
            lógica de negocio, o un array de strings para errores de validación
            de campos.
        errorType:
          type: string
          description: Código interno del error.
          example: Bad Request
        timestamp:
          type: string
          format: date-time
          description: Fecha y hora en que ocurrió el error (ISO 8601).
        path:
          type: string
          description: Ruta del endpoint que generó el error.
          example: /request/contractor
      required:
        - statusCode
        - message
        - errorType
        - timestamp
        - path
      example:
        statusCode: 400
        message: La cantidad de archivos debe ser igual que metadatos
        errorType: Bad Request
    InternalServerError:
      type: object
      properties:
        statusCode:
          type: integer
          description: Código de estado HTTP.
        message:
          type: string
          description: Mensaje descriptivo del error.
        error:
          type: string
          description: Descripción estándar del error HTTP.
      required:
        - statusCode
        - message
        - error
    WebhookEventOutput:
      type: object
      properties:
        action:
          type: string
          example: staff.create
        status:
          type: string
          example: success
        operationType:
          type: string
          example: create
        entity:
          type: string
          example: staff
        description:
          type: string
          example: creación de personal
        timestamp:
          type: string
          format: date-time
          example: '2026-05-14T10:00:00.000Z'
        payload:
          type: object
          description: Datos asociados al evento.
          additionalProperties: true
          properties: {}
      required:
        - action
        - status
        - operationType
        - entity
        - description
        - timestamp
        - payload
    ContractorAssociationListItem:
      type: object
      properties:
        rut:
          type: string
          example: 76000000-0
        name:
          type: string
          example: empresa dummy spa
      required:
        - rut
        - name
    VehicleContractorAssociationRequest:
      type: object
      properties:
        contractorRut:
          type: string
          description: RUT del contratista.
          example: 76000000-0
        patent:
          type: string
          description: Patente del vehículo.
          example: KTGT79
      required:
        - contractorRut
        - patent
    StaffContractorAssociationRequest:
      type: object
      properties:
        contractorRut:
          type: string
          description: RUT del contratista.
          example: 76000000-0
        staffRut:
          type: string
          description: RUT del personal.
          example: 24424242-2
