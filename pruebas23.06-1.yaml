      additionalProperties: true
      properties: {}
    DocumentConsultationResponse:
      type: object
      description: Respuesta de consulta de documentos de entidad.
      additionalProperties: true
      properties: {}
    ContractorCompanyMultipartRequest:
      type: object
      properties:
        contractor:
          type: object
          description: |
            Datos del contratista para el flujo de creación.
            Debe usarse contractorTypeId=1 para contratista empresa.
          properties:
            contractorTypeId:
              type: number
              description: >-
                ID del tipo de contratista. Para este flujo debe ser "1"
                (Empresa).
            rut:
              type: string
              description: RUT del contratista en formato con guiones sin puntos.
            businessName:
              type: string
              description: >-
                Nombre de la contratista. Obligatorio cuando sea tipo "1"
                (Empresa).
            serviceTypeId:
              type: number
              description: |
                ID del tipo de servicio del contratista.
                - Tipo "1" para Monitoreo: Revisión periódica.
                - Tipo "2" para Prospecto: Revisión única.
            reviewStartDate:
              type: string
              format: date-time
              description: Fecha de inicio de la review en formato ISO 8601.
            reviewEndDate:
              type: string
              format: date-time
              description: Fecha de fin de la review en formato ISO 8601.
            reviewCompaniesId:
              type: array
              items:
                type: integer
              description: >-
                IDs de empresas de revisión asociadas. Enviar arreglo vacío si
                no aplica.
          required:
            - contractorTypeId
            - rut
            - serviceTypeId
            - reviewStartDate
            - reviewEndDate
          example:
            contractorTypeId: 1
            rut: 76000000-0
            businessName: EMPRESA DUMMY SPA
            serviceTypeId: 1
            reviewStartDate: '2025-01-13T02:59:00.000Z'
            reviewEndDate: '2027-01-13T02:59:00.000Z'
            reviewCompaniesId: []
        contractorPartner:
          type: object
          description: Datos de la contraparte asociada al contratista.
          properties:
            rut:
              type: string
              description: >-
                RUT de la contraparte asociado al contratista. Formato con
                guiones sin puntos.
            name:
              type: string
              description: Nombre de la contraparte asociado al contratista.
            lastName:
              type: string
              description: >-
                Apellido de la contraparte asociado al contratista. Se requieren
                ambos apellidos.
            email:
              type: string
              description: Correo de la contraparte asociado al contratista.
            phoneNumber:
              type: string
              description: Telefono de la contraparte asociado al contratista.
          required:
            - rut
            - name
            - lastName
            - email
            - phoneNumber
          example:
            rut: 14260894-4
            name: Nombre
            lastName: Dummy
            email: dummy.partner@testia.cl
            phoneNumber: '+56987654321'
        metadata:
          description: Metadatos relacionados con los documentos del contratista.
          type: array
          items:
            type: object
            properties:
              fileName:
                type: string
                description: Nombre del documento a subir.
              documentType:
                type: number
                description: |
                  Identificador del tipo de documento a cargar.
                  - Para empresa:
                    - "16" F30 (Total pagos)
                    - "17" F30 - 1 (Pagos individuales)
                    - "18" Carpeta Tributaria.
                  Regla de obligatoriedad:
                    - Depende del contrato: puede ser obligatorio o deseable.
              documentEntity:
                type: number
                description: |
                  Identificador del tipo de documento a cargar.
                  - Para empresa:
                    - "1" Contratista.
            required:
              - fileName
              - documentType
              - documentEntity
          example:
            - fileName: F30_dummy.pdf
              documentType: 16
              documentEntity: 1
            - fileName: F30-1_dummy.pdf
              documentType: 17
              documentEntity: 1
            - fileName: carpeta_tributaria_dummy.pdf
              documentType: 18
              documentEntity: 1
        files:
          type: array
          items:
            type: string
            format: binary
          description: >-
            Los nombres y cantidad de los archivos deben coincidir con la
            metadata.
      required:
        - contractor
        - contractorPartner
