                    Natural cuya documentación se actualizará.
                  properties:
                    rut:
                      type: string
                      description: RUT del contratista en formato con guion y sin puntos.
                      example: 22222222-2
                  required:
                    - rut
                  example: {}
                metadata:
                  type: array
                  description: >-
                    Metadatos asociados a los documentos del Contratista Persona
                    Natural. Cada elemento debe incluir documentType y fileName.
                    La cantidad, el orden y los nombres definidos en fileName
                    deben coincidir con los archivos enviados en files.
                  items:
                    type: object
                    required:
                      - documentType
                      - fileName
                      - documentEntity
                    properties:
                      documentType:
                        type: number
                        description: |-
                          ID del tipo de documento.

                          Valores permitidos:

                          - `30`: Cédula de Identidad
                          - `31`: Licencia de Conducir
                          - `32`: Certificado de Antecedentes
                          - `33`: Hoja de Vida del Conductor
