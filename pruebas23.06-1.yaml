  /request/staff@files:
    post:
      summary: Actualizar documentos de Personal
      deprecated: false
      description: >
        Permite actualizar los documentos asociados a un personal ya registrado.
        Solo se requiere el RUT del personal junto con los nuevos documentos a
        cargar. La cantidad, el orden y los nombres definidos en fileName deben
        coincidir con los archivos enviados en files.
      operationId: updateStaffFilesIndependent
      tags:
        - Gestión de Personal
      parameters:
        - name: unassigned
          in: query
          required: true
          schema:
            type: boolean
            example: true
          description: Debe enviarse siempre como `true`.
      requestBody:
        content:
          multipart/form-data:
            encoding:
              staff:
                contentType: Datos mínimos del personal para actualización de documentos.
              metadata:
                contentType: Metadatos asociados a los documentos del personal.
              files:
                contentType: >-
                  Los nombres y cantidad de los archivos deben coincidir con la
                  metadata.
            schema:
              type: object
              properties:
                staff:
                  type: object
                  description: Datos mínimos para identificar al personal cuya documentación se actualizará.
                  properties:
                    rut:
                      type: string
                      description: RUT del personal en formato con guion y sin puntos.
                      example: 22222222-2
                  required:
                    - rut
                  example: {}
                metadata:
                  type: array
                  description: >-
                    Metadatos asociados a los documentos del personal. Cada
                    elemento debe incluir documentType y fileName. La cantidad,
                    el orden y los nombres definidos en fileName deben coincidir
                    con los archivos enviados en files.
                  items:
                    type: object
                    required:
                      - documentType
                      - fileName
                      - documentEntity
                    properties:
                      documentType:
                        type: number
                        description: |-
                          ID del tipo de documento.

                          Valores permitidos:

                          - `30`: Cédula de Identidad
                          - `31`: Licencia de Conducir
                          - `32`: Certificado de Antecedentes
                          - `33`: Hoja de Vida del Conductor
                        example: 30
                      fileName:
                        type: string
                        description: Nombre del archivo enviado en files.
                        example: cedula-frontal.jpeg
                      documentEntity:
                        type: number
                        description: |-
                          ID de la entidad asociada al documento.

                          Valores permitidos:

                          - `4`: Personal
                        example: 4
                      side:
                        type: string
                        description: >-
                          Lado del documento. Requerido para Cédula de Identidad
                          y Licencia de Conducir.

                          Valores permitidos:

                          - `frontal`

                          - `trasera`
                        example: frontal
                  example:
                    - documentType: 30
                      fileName: cedula-frontal.jpeg
                      documentEntity: 4
                      side: frontal
                    - documentType: 30
                      fileName: cedula-trasera.jpeg
                      documentEntity: 4
                      side: trasera
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: >-
                    Archivos del personal. Adjuntar un archivo por cada elemento
                    definido en metadata. La cantidad, el orden y los nombres de
                    los archivos deben coincidir con los valores informados en
                    metadata.fileName.
                  example:
                    - cedula-frontal.jpeg
                    - cedula-trasera.jpeg
              required:
                - staff
                - metadata
                - files
            example:
              staff:
                rut: 22222222-2
              metadata:
                - documentType: 30
                  fileName: cedula-frontal.jpeg
                  documentEntity: 4
                  side: frontal
                - documentType: 30
                  fileName: cedula-trasera.jpeg
                  documentEntity: 4
                  side: trasera
              files:
                - cedula-frontal.jpeg
                - cedula-trasera.jpeg
        required: true
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                actualizacion_exitosa:
                  summary: Documentos actualizados correctamente
                  value:
                    statusCode: 201
                    message: Documentos del personal actualizados correctamente
