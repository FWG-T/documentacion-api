  /webhooks/configuration:
    post:
      summary: Configuración de webhooks y eventos disponibles
      deprecated: false
      description: >-
        Esta guía describe la configuración y el funcionamiento del webhook
        utilizado para recibir notificaciones de la API Testia en tiempo real.


        <br>


        Un webhook es un mecanismo que permite a la API Testia notificar eventos
        a sistemas externos de forma automática. A través de este mecanismo, es
        posible recibir actualizaciones sobre Contratistas Empresa, Contratistas
        Persona Natural, Personal, Vehículos y sus respectivos documentos
        directamente en un endpoint definido por el cliente.


        <br>


        Para recibir estas notificaciones, es necesario configurar una URL de
        recepción donde la API Testia enviará los eventos mediante solicitudes
        HTTP POST.


        <br>


        **Funcionamiento**


        <br>


        _Configuración del webhook_


        La URL de recepción debe registrarse en el Portal API Testia para
        habilitar el envío de eventos.


        <br>


        _Método de envío_


        Todas las notificaciones se envían mediante HTTP POST.


        <br>


        _Formato del contenido_


        El payload del webhook se envía en formato JSON.


        <br>


        _Estructura base del mensaje_


        * **action:** acción realizada.

        * **status:** estado de la operación.

        * **operationType:** tipo de operación.

        * **entity:** entidad sobre la que se realizó la operación.

        * **timestamp:** fecha y hora del evento en formato ISO 8601.

        * **payload:** objeto con la información asociada al evento.


        <br>


        Los ejemplos de payload para cada entidad y tipo de evento se encuentran
        documentados en los siguientes endpoints:


        * `/webhooks/contractor`

        * `/webhooks/contractor@natural-person`

        * `/webhooks/staff`

        * `/webhooks/vehicle`


        <br>


        **Nota:** esta sección tiene fines informativos para el proceso de
        onboarding. La configuración operacional y habilitación de eventos se
        realiza a través del Portal API y según los lineamientos definidos por
        Testia.
      operationId: webhookConfigurationGuide
      tags:
        - Configuración de Webhook
      parameters: []
      responses:
        '200':
          description: Estructura base de los eventos webhook
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    type: string
                    example: staff.create
                  status:
                    type: string
                    example: success
                  operationType:
                    type: string
                    example: create
                  entity:
                    type: string
                    example: staff
                  description:
                    type: string
                    example: creación de personal
                  timestamp:
                    type: string
                    format: date-time
                    example: '2026-05-14T10:00:00.000Z'
                  payload:
                    type: object
                    description: Datos asociados al evento.
                    additionalProperties: true
                    properties: {}
                required:
                  - action
                  - status
                  - operationType
                  - entity
                  - timestamp
                  - payload
              example:
                action: staff.create
                status: success
                operationType: create
                entity: staff
                timestamp: '2026-05-14T10:00:00.000Z'
                payload: {}
          headers: {}
      security:
        - ApiKeyAuth: []
