openapi: 3.0.1
info:
  title: Módulo predeterminado
  description: >
    API para la creación, activación y desactivación de contratistas, vehículos
    y personal, incluyendo la actualización de sus documentos de manera
    centralizada.
  version: 1.0.0
tags:
  - name: Gestión de Contratista Empresa
  - name: Gestión de Contratista Persona Natural
  - name: Gestión de Vehículos
  - name: Gestión de Personal
  - name: Gestión de Relación
  - name: Configuración de Webhook
paths:
  /request/contractor:
    post:
      summary: Crear Contratista Empresa
      deprecated: false
      description: >
        Permite registrar un Contratista Empresa, incluyendo sus datos
        principales, contraparte asociada y documentos requeridos según
        contrato. La obligatoriedad y el tipo de documentos dependen de la
        configuración contractual.
      operationId: createContractor
      tags:
        - Gestión de Contratista Empresa
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            encoding:
              contractor:
                contentType: >-
                  Datos del Contratista Empresa para el flujo de creación. Debe
                  enviarse contractorTypeId=1.
              contractorPartner:
                contentType: Datos de la contraparte asociada al Contratista Empresa.
              metadata:
                contentType: Metadatos asociados a los documentos del Contratista Empresa.
              files:
                contentType: >-
                  Los nombres y cantidad de los archivos deben coincidir con la
                  metadata.
            schema:
              type: object
              properties:
                contractor:
                  type: object
                  properties:
                    contractorTypeId:
                      type: number
                      description: >-
                        ID del tipo de contratista. Debe enviarse el valor 1
                        para Contratista Empresa.
                      example: 1
                    rut:
                      type: string
                      description: RUT del contratista en formato con guion y sin puntos.
                      example: 76000000-0
                    businessName:
                      type: string
                      description: Razón social del contratista.
                      example: Empresa Ejemplo SpA
                    serviceTypeId:
                      type: string
                      description: |-
                        Tipo de servicio solicitado.

                        Valores permitidos:

                        - `1`: Monitoreo
                        - `2`: Revisión única
                      example: '1'
                    reviewStartDate:
                      type: string
                      description: Fecha de inicio de la revisión en formato YYYY-MM-DD.
                      example: '2026-06-17'
                    reviewEndDate:
                      type: string
                      description: Fecha de término de la revisión en formato YYYY-MM-DD.
                      example: '2027-06-16'
                    reviewCompaniesId:
                      type: string
                      description: >-
                        Código de la empresa que realiza la consulta. Si no
                        dispone del código, enviar vacío.
                      example: '123'
                  required:
                    - contractorTypeId
                    - rut
                    - businessName
                    - serviceTypeId
                    - reviewStartDate
                    - reviewEndDate
                    - reviewCompaniesId
                  description: Datos del Contratista Empresa para el flujo de creación.
                  example: {}
                contractorPartner:
                  type: object
                  properties:
                    rut:
                      type: string
                      description: >-
                        RUT de la persona designada como contraparte, en formato
                        con guion y sin puntos.
                      example: 11111111-1
                    name:
                      type: string
                      description: Nombre de la persona designada como contraparte.
                      example: Juan
                    lastName:
                      type: string
                      description: Apellido de la persona designada como contraparte.
                      example: Pérez
                    email:
                      type: string
                      description: >-
                        Correo electrónico de la persona designada como
                        contraparte.
                      example: juan.perez@empresa.cl
                    phoneNumber:
                      type: string
                      description: |-
                        Número de teléfono de la persona de contacto.

                        Formato recomendado:

                        - `+56912345678`
                  required:
                    - rut
                    - name
                    - lastName
                    - email
                    - phoneNumber
                  description: >-
                    Datos de la persona designada como contraparte del
                    Contratista Empresa.
                  example: {}
                metadata:
                  type: array
                  items:
                    type: object
                    required:
                      - documentType
                      - fileName
                    properties:
                      documentType:
                        type: number
                        description: |-
                          ID del tipo de documento.

                          Valores permitidos:

                          - `16`: F30
                          - `17`: F30-1
                          - `18`: Carpeta Tributaria
                        example: 16
                      fileName:
                        type: string
                        description: Nombre del archivo enviado en files.
                        example: F30.pdf
                  description: >-
                    Metadatos asociados a los documentos del Contratista
                    Empresa. Si se envía este campo, cada elemento debe incluir
                    documentType y fileName. La cantidad, el orden y los nombres
                    definidos en fileName deben coincidir con los archivos
                    enviados en files.
                  example:
                    - documentType: 16
                      fileName: F30.pdf
                    - documentType: 17
                      fileName: F30-1.pdf
                    - documentType: 18
                      fileName: carpeta-tributaria.pdf
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: >-
                    Archivos del Contratista Empresa. Adjuntar un archivo por
                    cada elemento definido en metadata. La cantidad, el orden y
                    los nombres de los archivos deben coincidir con los valores
                    informados en metadata.fileName.
                  example:
                    - F30.pdf
                    - F30-1.pdf
                    - carpeta-tributaria.pdf
              required:
                - contractor
                - contractorPartner
            example:
              contractor:
                contractorTypeId: 1
                rut: 76000000-0
                businessName: Empresa Ejemplo SpA
                serviceTypeId: '1'
                reviewStartDate: '2026-06-17'
                reviewEndDate: '2027-06-16'
                reviewCompaniesId: '123'
              contractorPartner:
                rut: 11111111-1
                name: Juan
                lastName: Pérez González
                email: juan.perez@empresa-ejemplo.cl
                phoneNumber: '+56912345678'
              metadata:
                - documentType: 16
                  fileName: F30.pdf
                - documentType: 17
                  fileName: F30-1.pdf
                - documentType: 18
                  fileName: carpeta-tributaria.pdf
              files:
                - F30.pdf
                - F30-1.pdf
                - carpeta-tributaria.pdf
        required: true
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                empresa:
                  summary: Ejemplo exitoso empresa
                  value:
                    message: >-
                      Solicitud de creacion de contratista recibida y
                      procesando...
          headers: {}
        '400':
          description: Solicitud inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                '2':
                  summary: Propiedad rut del Contratista Empresa ausente o vacía
                  value:
                    statusCode: 400
                    timestamp: '2026-06-15T21:23:01.880Z'
                    path: /request/contractor
                    message: Verificar propiedad rut de contractor
                    errorType: Bad Request
                '3':
                  summary: RUT del Contratista Empresa no válido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-15T21:42:16.817Z'
                    path: /request/contractor
                    message: El RUT del contratista no valido
                    errorType: Bad Request
                '4':
                  summary: Datos del Contratista Empresa inválidos o incompletos
                  value:
                    statusCode: 400
                    timestamp: '2026-06-15T21:25:59.865Z'
                    path: /request/contractor
                    message: Formato JSON de la propiedad contractor no valido
                    errorType: Bad Request
                '5':
                  summary: Contratista Empresa ya registrado
                  value:
                    statusCode: 400
                    timestamp: '2026-06-15T21:32:38.506Z'
                    path: /request/contractor
                    message: >-
                      Este contratista ya está registrado. Para actualizar su
                      documentación, asegúrate de completar el campo ‘metadata’
                      y sus archivos.
                    errorType: Bad Request
                '6':
                  summary: Cantidad de archivos y metadatos no coincide
                  value:
                    statusCode: 400
                    timestamp: '2026-06-15T21:37:03.762Z'
                    path: /request/contractor
                    message: la cantidad de archivos debe ser igual al de metadatos
                    errorType: Bad Request
                archivo_no_encontrado:
                  summary: Archivo en metadata no coincide con archivo enviado
                  value:
                    statusCode: 400
                    timestamp: '2026-06-22T14:46:35.559Z'
                    path: /request/contractor
                    message: El archivo *CIF.jpeg* en los metadatos no coincide con el archivo enviado o no se encuentra.
                    errorType: Bad Request
                '7':
                  summary: Archivo excede el tamaño máximo permitido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-15T21:59:14.163Z'
                    path: /request/contractor
                    message: Tamaño de archivo demasiado grande
                    errorType: Bad Request
                '8':
                  summary: Nombre de archivo no coincide con la metadata
                  value:
                    statusCode: 400
                    timestamp: '2026-06-16T20:17:49.368Z'
                    path: /request/contractor
                    message: >-
                      El archivo CT.pdf en los metadatos no coincide con el
                      archivo enviado o no se encuentra.
                    errorType: Bad Request
                nombre_empresa_ausente:
                  summary: Razón social del Contratista Empresa ausente
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T20:54:53.537Z'
                    path: /request/contractor
                    message: El nombre de la empresa es requerido
                    errorType: Bad Request
                fecha_inicio_invalida:
                  summary: Fecha de inicio de revisión ausente o con formato inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T20:56:24.047Z'
                    path: /request/contractor
                    message:
                      - >-
                        Propiedad faltante o invalida: reviewStartDate:
                        reviewStartDate must be a valid ISO 8601 date string
                    errorType: Bad Request
                fecha_fin_invalida:
                  summary: Fecha de término de revisión ausente o con formato inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T20:56:24.047Z'
                    path: /request/contractor
                    message:
                      - >-
                        Propiedad faltante o invalida: reviewEndDate:
                        reviewEndDate must be a valid ISO 8601 date string
                    errorType: Bad Request
                service_type_invalido:
                  summary: Tipo de servicio ausente o con valor inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:15:28.066Z'
                    path: /request/contractor
                    message: >-
                      Propiedad faltante o invalida: serviceTypeId: La propiedad
                      serviceTypeId debe ser un entero entre 1 y 2, y es
                      requerido
                    errorType: Bad Request
                contractor_partner_ausente:
                  summary: Contratista Empresa o contraparte no enviados
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:12:00.450Z'
                    path: /request/contractor
                    message: Las propiedades contractor y contractorPartner son requeridas al crear
                    errorType: Bad Request
                contractor_type_id_ausente:
                  summary: contractorTypeId ausente o inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-22T14:36:35.730Z'
                    path: /request/contractor
                    message: >-
                      Propiedad faltante o invalida: contractorTypeId: La
                      propiedad contractorTypeId debe ser un entero entre 1 y 2,
                      y es requerido,Propiedad faltante o invalida: rut: El rut
                      debe estar en formato válido
                    errorType: Bad Request
                contractor_type_persona_natural:
                  summary: contractorTypeId no enviado (asume persona natural)
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:12:50.765Z'
                    path: /request/contractor
                    message: El nombre, apellido y apellido materno del contratista tipo 2 son requeridos
                    errorType: Bad Request
                rut_contraparte_invalido:
                  summary: RUT de la contraparte ausente o inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T20:59:28.149Z'
                    path: /request/contractor
                    message: El RUT de la contraparte no es valido
                    errorType: Bad Request
                nombre_contraparte_ausente:
                  summary: Nombre de la contraparte ausente
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:18:04.062Z'
                    path: /request/contractor
                    message:
                      - >-
                        Propiedad faltante o invalida: name: La propiedad name
                        debe estar en string y es requerido
                    errorType: Bad Request
                apellido_contraparte_ausente:
                  summary: Apellido de la contraparte ausente
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:18:22.159Z'
                    path: /request/contractor
                    message:
                      - >-
                        Propiedad faltante o invalida: lastName: La propiedad
                        lastName debe estar en string y es requerido
                    errorType: Bad Request
                email_contraparte_invalido:
                  summary: Email de la contraparte inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-22T14:43:37.825Z'
                    path: /request/contractor
                    message:
                      - 'Propiedad faltante o invalida: email: email must be an email'
                    errorType: Bad Request
                telefono_contraparte_invalido:
                  summary: Teléfono de la contraparte ausente o con formato inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-22T14:44:15.703Z'
                    path: /request/contractor
                    message:
                      - >-
                        Propiedad faltante o invalida: phoneNumber: El teléfono
                        debe estar en formato válido (+56) sin espacio y de 9
                        dígitos
                    errorType: Bad Request
                filename_vacio:
                  summary: Campo fileName vacío en metadata
                  value:
                    statusCode: 400
                    timestamp: '2026-06-22T14:53:43.650Z'
                    path: /request/contractor
                    message: El archivo ** en los metadatos no coincide con el archivo enviado o no se encuentra.
                    errorType: Bad Request
                filename_ausente:
                  summary: Campo fileName ausente en metadata
                  value:
                    statusCode: 400
                    timestamp: '2026-06-22T14:54:45.450Z'
                    path: /request/contractor
                    message: Formato JSON de la propiedad metadata no valido
                    errorType: Bad Request
                tipo_documento_invalido:
                  summary: Tipo de documento ausente o inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:08:10.455Z'
                    path: /request/contractor
                    message: El tipo de documento no es valido
                    errorType: Bad Request
                metadata_ausente:
                  summary: Campo metadata ausente al enviar archivos
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:10:39.249Z'
                    path: /request/contractor
                    message: El campo metadata es requerido si envia archivos
                    errorType: Bad Request
          headers: {}
        '401':
          description: API key ausente o inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
              examples:
                '9':
                  summary: API key ausente
                  value:
                    message: No API key found in request
                    request_id: 2d1f231d4edb4449235ca43da6562232
                '10':
                  summary: API key inválida
                  value:
                    message: Unauthorized
                    request_id: cbc5e948470e935e67f5130f9ac2c367
          headers: {}
        '403':
          description: Empresa o contrato sin habilitación para uso de API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                '12':
                  summary: Contrato no vigente
                  value:
                    statusCode: 403
                    timestamp: '2026-06-16T16:58:24.975Z'
                    path: /request/contractor
                    message: Contrato no vigente
                    errorType: c001
                '13':
                  summary: Uso de API no habilitado
                  value:
                    statusCode: 403
                    timestamp: '2026-06-16T17:08:43.853Z'
                    path: /request/contractor
                    message: Empresa no tiene activa el uso de la API
                    errorType: c003
                empresa_no_encontrada:
                  summary: Empresa no habilitada
                  value:
                    statusCode: 403
                    timestamp: '2026-06-16T16:56:15.220Z'
                    path: /request/contractor
                    message: Empresa no habilitada
                    errorType: c001
          headers: {}
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                error_interno:
                  summary: Error interno del servidor
                  value:
                    statusCode: 500
                    message: Error interno, intente nuevamente
                    error: Internal Server Error
          headers: {}
      security:
        - ApiKeyAuth: []
  /request/contractor@files:
    post:
      summary: Actualizar documentos de Contratista Empresa
      deprecated: false
      description: >-
        Permite actualizar los documentos de un Contratista Empresa previamente
        registrado. Se debe enviar el RUT del contratista, la metadata de los
        documentos y los archivos asociados. Los nombres y la cantidad de
        archivos deben coincidir con la metadata enviada.
      operationId: updateContractorFilesDoc
      tags:
        - Gestión de Contratista Empresa
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                contractor:
                  type: object
                  properties:
                    rut:
                      type: string
                      description: >-
                        RUT del Contratista Empresa en formato con guion y sin
                        puntos.
                  description: >-
                    Datos mínimos requeridos para identificar al Contratista
                    Empresa.
                  required:
                    - rut
                  example:
                    rut: 76000000-0
                metadata:
                  description: >-
                    Metadatos asociados a los documentos del Contratista
                    Empresa.
                  type: array
                  items:
                    type: object
                    properties:
                      fileName:
                        type: string
                        description: >-
                          Nombre del archivo a cargar. Debe coincidir con el
                          nombre enviado en files.
                      documentType:
                        type: number
                        description: |-
                          ID del tipo de documento asociado al Contratista Empresa.

                          Valores permitidos:

                          - `16`: F30 (Total pagos)
                          - `17`: F30-1 (Pagos individuales)
                          - `18`: Carpeta Tributaria

                          La obligatoriedad de cada documento depende de la configuración contractual.
                    required:
                      - fileName
                      - documentType
                  example:
                    - fileName: F30.pdf
                      documentType: 16
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: >-
                    Archivos asociados a la metadata enviada. Los nombres y la
                    cantidad de archivos deben coincidir con la metadata.
                  example:
                    - F30.pdf
              required:
                - contractor
                - metadata
                - files
            example:
              contractor:
                rut: 76000000-0
              metadata:
                - fileName: F30.pdf
                  documentType: 16
              files:
                - F30.pdf
        required: true
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                archivos_actualizados:
                  summary: Solicitud de actualización recibida
                  value:
                    message: >-
                      Solicitud de actualizacion de contratista recibida y
                      procesando...
          headers: {}
        '400':
          description: Solicitud inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                rut_ausente_o_invalido:
                  summary: RUT del Contratista Empresa ausente, vacío o inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:33:32.425Z'
                    path: /request/contractor
                    message: Verificar propiedad rut de contractor
                    errorType: Bad Request
                rut_formato_invalido:
                  summary: RUT del Contratista Empresa con formato inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:33:46.609Z'
                    path: /request/contractor
                    message: El RUT del contratista no valido
                    errorType: Bad Request
                contractor_ausente:
                  summary: Propiedad contractor ausente en el request
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:33:57.413Z'
                    path: /request/contractor
                    message: La propiedad contractor es requerido
                    errorType: Bad Request
                contractor_json_invalido:
                  summary: Propiedad contractor con formato JSON inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:35:40.422Z'
                    path: /request/contractor
                    message: Formato JSON de la propiedad contractor no valido
                    errorType: Bad Request
                contratista_no_registrado:
                  summary: Contratista Empresa no registrado en la plataforma
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:45:33.846Z'
                    path: /request/contractor
                    message: Las propiedades contractor y contractorPartner son requeridas al crear
                    errorType: Bad Request
                metadata_ausente:
                  summary: Metadata ausente al enviar archivos
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:49:50.961Z'
                    path: /request/contractor
                    message: >-
                      Este contratista ya está registrado. Para actualizar su
                      documentación, asegúrate de completar el campo 'metadata'
                      y sus archivos.
                    errorType: Bad Request
                metadata_json_invalido:
                  summary: Metadata con formato JSON inválido, fileName o documentType ausente o inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:37:18.832Z'
                    path: /request/contractor
                    message: Formato JSON de la propiedad metadata no valido
                    errorType: Bad Request
                archivos_metadata_no_coinciden:
                  summary: Cantidad de archivos y metadatos no coincide
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:40:52.316Z'
                    path: /request/contractor
                    message: La cantidad de archivos debe ser igual que metadatos
                    errorType: Bad Request
                nombre_archivo_no_coincide:
                  summary: Nombre de archivo no coincide con la metadata
                  value:
                    statusCode: 400
                    timestamp: '2026-06-16T20:17:49.368Z'
                    path: /request/contractor
                    message: >-
                      El archivo CT.pdf en los metadatos no coincide con el
                      archivo enviado o no se encuentra.
                    errorType: Bad Request
                archivo_muy_grande:
                  summary: Archivo excede el tamaño máximo permitido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-16T20:20:09.450Z'
                    path: /request/contractor
                    message: Tamaño de archivo demasiado grande
                    errorType: Bad Request
                tipo_documento_invalido:
                  summary: Tipo de documento inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-19T21:08:10.455Z'
                    path: /request/contractor
                    message: El tipo de documento no es valido
                    errorType: Bad Request
          headers: {}
        '401':
          description: API key ausente o inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
              examples:
                api_key_ausente:
                  summary: API key ausente
                  value:
                    message: No API key found in request
                    request_id: 2d1f231d4edb4449235ca43da6562232
                api_key_invalida:
                  summary: API key inválida
                  value:
                    message: Unauthorized
                    request_id: cbc5e948470e935e67f5130f9ac2c367
          headers: {}
        '403':
          description: Empresa o contrato sin habilitación para uso de API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                '11':
                  summary: Contrato no vigente
                  value:
                    statusCode: 403
                    timestamp: '2026-06-16T16:58:24.975Z'
                    path: /request/contractor
                    message: Contrato no vigente
                    errorType: c001
                '12':
                  summary: Uso de API no habilitado
                  value:
                    statusCode: 403
                    timestamp: '2026-06-16T17:08:43.853Z'
                    path: /request/contractor
                    message: Empresa no tiene activa el uso de la API
                    errorType: c003
                empresa_no_encontrada:
                  summary: Empresa no habilitada
                  value:
                    statusCode: 403
                    timestamp: '2026-06-16T16:56:15.220Z'
                    path: /request/contractor
                    message: Empresa no habilitada
                    errorType: c001
          headers: {}
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                error_interno:
                  summary: Error interno del servidor
                  value:
                    statusCode: 500
