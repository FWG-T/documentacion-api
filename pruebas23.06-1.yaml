  /consultation/doc/contractor/{rutContractor}:
    get:
      summary: Consultar documentos de Contratista Empresa
      deprecated: false
      description: >-
        Permite obtener los documentos asociados a un Contratista Empresa
        previamente registrado, a partir de su RUT. Retorna el detalle de cada
        documento incluyendo su tipo, estado, URL de descarga e información
        extraída del contenido.
      operationId: getContractorDocuments
      tags:
        - Gestión de Contratista Empresa
      parameters:
        - name: rutContractor
          in: path
          description: RUT del Contratista Empresa en formato con guion y sin puntos.
          required: true
          example: 76000000-0
          schema:
            type: string
            example: 76000000-0
      responses:
        '200':
          description: Documentos obtenidos exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Lista de documentos asociados al Contratista Empresa.
                    items:
                      type: object
                      properties:
                        documentTypeId:
                          type: number
                          description: >-
                            ID del tipo de documento.

                            Valores posibles:

                            - `16`: F30 (Total pagos)

                            - `17`: F30-1 (Pagos individuales)

                            - `18`: Carpeta Tributaria
                        documentTypeName:
                          type: string
                          description: Nombre descriptivo del tipo de documento.
                        documentEntityId:
                          type: number
                          description: ID de la entidad asociada al documento.
                        documentEntityName:
                          type: string
                          description: Nombre de la entidad asociada al documento.
                        contentType:
                          type: string
                          description: Tipo MIME del archivo.
                          example: application/pdf
                        statusId:
                          type: number
                          description: |-
                            ID del estado del documento.

                            Valores posibles:

                            - `1`: Válido
                            - `2`: Pendiente de subir
