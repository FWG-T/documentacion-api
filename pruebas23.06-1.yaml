                - "5" Camión pluma
                - "6" Cisterna
                - "7" Furgón
                - "8" Rampla abierta
                - "9" Rampla cerrada
                - "10" Refrigerado
                - "11" Semi baranda
                - "12" Sider
                - "13" Tracto
                - "14" Transportador de vehículos
                - "15" Utilitario
                - "16" Otro
            patent:
              type: string
              description: Patente del vehículo.
          required:
            - vehicleType
            - patent
          example:
            vehicleType: 1
            patent: BDZW17
        coupled:
          type: object
          description: Datos opcionales de acoplado a crear junto al vehiculo.
          properties:
            coupledType:
              type: number
              description: Identificador del tipo de acoplado.
            patent:
              type: string
              description: Patente del acoplado.
          required:
            - coupledType
            - patent
          example:
            coupledType: 1
            patent: GSFZ70
        metadata:
          type: array
          description: Metadatos relacionados con los documentos del vehículo o acoplado.
          items:
            type: object
            properties:
              fileName:
                type: string
                description: Nombre del documento a subir.
              documentType:
                type: number
                description: >
                  Identificador del tipo de documento a cargar.

                  - "24" Permiso de circulación

                  - "25" Revisión técnica

                  - "26" SOAP

                  - "28" Póliza del seguro

                  - "29" Pagos del seguro

                  Regla de obligatoriedad:

                  - 24, 25 y 26 suelen ser obligatorios según contrato.

                  - 28 y 29 pueden ser obligatorios o deseables según contrato.

                  - "27" Encargo por robo existe en catálogo, pero no es de
                  carga (`is_file=false`).
              documentEntity:
                type: number
                description: |
                  Identificador de entidad del documento.
                  - "3" Vehículo
                  - "5" Acoplado
              patent:
                type: string
                description: Patente del vehículo o acoplado asociado al documento.
              period:
                type: string
                description: >-
                  Periodo MM/YYYY para documentos periódicos (ejemplo,
                  documentType 29).
            required:
              - fileName
              - documentType
              - documentEntity
              - patent
          example:
            - fileName: PC.jpeg
              documentType: 24
              documentEntity: 3
              patent: BDZW17
            - fileName: pagos_marzo_2026.pdf
              documentType: 29
              documentEntity: 3
              patent: BDZW17
              period: 03/2026
        files:
          type: array
          items:
            type: string
            format: binary
          description: >-
            Los nombres y cantidad de los archivos deben coincidir con la
            metadata.
      required:
        - vehicle
  responses: {}
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: apikey
servers:
  - url: https://api.example.com
    description: Documentación
security: []
