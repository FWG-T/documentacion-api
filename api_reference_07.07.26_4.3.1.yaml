                    statusCode: 400
                    timestamp: '2026-06-25T17:47:50.272Z'
                    path: /request/contractor
                    message: Formato JSON de la propiedad contractor no valido
                    errorType: Bad Request
                contractor_partner_json_invalido:
                  summary: Propiedad contractorPartner con formato JSON inválido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-25T17:48:44.175Z'
