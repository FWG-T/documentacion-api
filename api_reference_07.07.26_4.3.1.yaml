components:
  schemas:
    AcceptedResponse:
      type: object
      properties:
        message:
          type: string
          description: >-
            Mensaje que confirma que la solicitud fue recibida y será procesada
            de forma asíncrona.
          example: Solicitud recibida y procesando
      required:
        - message
    UnauthorizedResponse:
      type: object
      description: Respuesta del gateway cuando la API key es ausente o invalida.
      properties:
        message:
          type: string
          description: Mensaje que indica el motivo del error de autenticación.
          example: Unauthorized
        request_id:
          type: string
          description: Identificador único de la solicitud.
          example: fd49b7506711ab474ebb396eb7d07c45
      required:
        - message
        - request_id
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          description: Código HTTP del error.
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: >-
            Mensaje descriptivo del error. Puede ser un string para errores de
            lógica de negocio, o un array de strings para errores de validación
            de campos.
        errorType:
          type: string
          description: Código interno del error.
          example: Bad Request
        timestamp:
          type: string
          format: date-time
          description: Fecha y hora en que ocurrió el error (ISO 8601).
        path:
          type: string
          description: Ruta del endpoint que generó el error.
          example: /request/contractor
      required:
        - statusCode
        - message
        - errorType
        - timestamp
        - path
      example:
        statusCode: 400
        message: La cantidad de archivos debe ser igual que metadatos
        errorType: Bad Request
    InternalServerError:
      type: object
      properties:
        statusCode:
          type: integer
          description: Código de estado HTTP.
        message:
          type: string
          description: Mensaje descriptivo del error.
        error:
          type: string
          description: Descripción estándar del error HTTP.
      required:
        - statusCode
        - message
        - error
