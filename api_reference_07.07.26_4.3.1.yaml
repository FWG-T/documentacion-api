  /request/contractor@natural-person:
    post:
      summary: Crear Contratista Persona Natural
      deprecated: false
      description: >
        Permite registrar un Contratista Persona Natural, incluyendo sus datos
        principales, contraparte asociada y documentos requeridos según
        contrato. La obligatoriedad y el tipo de documentos dependen de la
        configuración contractual.
      operationId: createContractorNaturalPerson
      tags:
        - Gestión de Contratista Persona Natural
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            encoding:
              contractor:
                contentType: >-
                  Datos del Contratista Persona Natural para el flujo de
                  creación. Debe enviarse contractorTypeId=2.
              contractorPartner:
                contentType: >-
                  Datos de la contraparte asociada al Contratista Persona
                  Natural.
              metadata:
                contentType: >-
                  Metadatos asociados a los documentos del Contratista Persona
                  Natural.
              files:
                contentType: >-
                  Los nombres y cantidad de los archivos deben coincidir con la
                  metadata.
            schema:
              type: object
              properties:
                contractor:
                  type: object
                  description: >-
                    Datos del Contratista Persona Natural para el flujo de
                    creación.
                  properties:
                    contractorTypeId:
                      type: number
                      description: >-
                        ID del tipo de contratista. Debe enviarse el valor 2
                        para Contratista Persona Natural.
                      example: 2
                    rut:
                      type: string
                      description: RUT del contratista en formato con guion y sin puntos.
                      example: 22222222-2
                    name:
                      type: string
                      description: Nombre del contratista.
                      example: Ana
                    lastName:
                      type: string
                      description: Apellido paterno del contratista.
                      example: López
                    mothersLastName:
                      type: string
                      description: Apellido materno del contratista.
                      example: Martínez
                    serviceTypeId:
                      type: number
                      description: |-
                        Tipo de servicio solicitado.

                        Valores permitidos:

                        - `1`: Monitoreo
                        - `2`: Revisión única
                      example: 1
                    reviewStartDate:
                      type: string
                      description: Fecha de inicio de la revisión en formato YYYY-MM-DD.
                      example: '2026-06-17'
                    reviewEndDate:
                      type: string
                      description: Fecha de término de la revisión en formato YYYY-MM-DD.
                      example: '2027-06-16'
                    reviewCompaniesId:
                      type: array
                      description: >-
                        Código de la empresa que realiza la consulta. Si no
                        dispone del código, enviar vacío.
                      example: []
                  required:
                    - contractorTypeId
                    - rut
                    - name
                    - lastName
                    - mothersLastName
                    - serviceTypeId
                    - reviewStartDate
                    - reviewEndDate
                    - reviewCompaniesId
                  example: {}
                contractorPartner:
                  type: object
                  description: >-
                    Datos de la persona designada como contraparte del
                    Contratista Persona Natural.
                  properties:
                    rut:
                      type: string
                      description: >-
                        RUT de la persona designada como contraparte, en formato
                        con guion y sin puntos.
                      example: 11111111-1
                    name:
                      type: string
                      description: Nombre de la persona designada como contraparte.
                      example: Juan
                    lastName:
                      type: string
                      description: Apellido de la persona designada como contraparte.
                      example: Pérez González
                    email:
                      type: string
                      description: >-
                        Correo electrónico de la persona designada como
                        contraparte.
                      example: juan.perez@empresa-ejemplo.cl
                    phoneNumber:
                      type: string
                      description: |-
                        Número de teléfono de la persona de contacto.

                        Formato requerido:

                        - `+56912345678`
                  required:
                    - rut
                    - name
                    - lastName
                    - email
                    - phoneNumber
                  example: {}
                metadata:
                  type: array
                  description: >-
                    Metadatos asociados a los documentos del Contratista Persona
                    Natural. Si se envía este campo, cada elemento debe incluir
                    documentType y fileName. La cantidad, el orden y los nombres
                    definidos en fileName deben coincidir con los archivos
                    enviados en files.
                  items:
                    type: object
                    required:
                      - documentType
                      - fileName
                    properties:
                      documentType:
                        type: number
                        description: |-
                          ID del tipo de documento.

                          Valores permitidos:

                          - `30`: Cédula de Identidad
                          - `31`: Licencia de Conducir
                          - `32`: Certificado de Antecedentes
                          - `33`: Hoja de Vida del Conductor
                        example: 30
                      fileName:
                        type: string
                        description: >-
                          Nombre del archivo enviado en files, incluyendo su extensión. Debe coincidir exactamente con el nombre del archivo adjunto (ej: F30.pdf, cedula-frontal.jpeg).
                        example: cedula_frontal.jpeg
                      side:
                        type: string
                        description: >-
                          Lado del documento. Requerido para Cédula de Identidad
                          (tipo 30) y Licencia de Conducir (tipo 31). No debe
                          enviarse para Certificado de Antecedentes (tipo 32)
                          ni Hoja de Vida del Conductor (tipo 33).

                          Valores permitidos:

                          - `frontal`

                          - `trasera`
                        example: frontal
                  example:
                    - documentType: 30
                      fileName: cedula_frontal.jpeg
                      side: frontal
                    - documentType: 30
                      fileName: cedula_trasera.jpeg
                      side: trasera
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: >-
                    Archivos del Contratista Persona Natural. Adjuntar un
                    archivo por cada elemento definido en metadata. La cantidad,
                    el orden y los nombres de los archivos deben coincidir con
                    los valores informados en metadata.fileName.
                  example:
                    - cedula_frontal.jpeg
                    - cedula_trasera.jpeg
              required:
                - contractor
                - contractorPartner
            example:
              contractor:
                contractorTypeId: 2
                rut: 22222222-2
                name: Ana
                lastName: López
                mothersLastName: Martínez
                serviceTypeId: 1
                reviewStartDate: '2026-06-17'
                reviewEndDate: '2027-06-16'
                reviewCompaniesId: []
              contractorPartner:
                rut: 11111111-1
                name: Juan
                lastName: Pérez González
                email: juan.perez@empresa-ejemplo.cl
                phoneNumber: '+56912345678'
              metadata:
                - documentType: 30
                  fileName: cedula_frontal.jpeg
                  side: frontal
                - documentType: 30
                  fileName: cedula_trasera.jpeg
                  side: trasera
                - documentType: 31
                  fileName: licencia_frontal.jpeg
                  side: frontal
                - documentType: 31
                  fileName: licencia_trasera.jpeg
                  side: trasera
                - documentType: 32
                  fileName: certificado_antecedentes.pdf
                - documentType: 33
                  fileName: hoja_vida_conductor.pdf
              files:
                - cedula_frontal.jpeg
                - cedula_trasera.jpeg
                - licencia_frontal.jpeg
                - licencia_trasera.jpeg
                - certificado_antecedentes.pdf
                - hoja_vida_conductor.pdf
        required: true
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                creacion_exitosa:
                  summary: Contratista Persona Natural creado correctamente
                  value:
                    statusCode: 201
                    message: Solicitud de creacion de contratista recibida y procesando...
          headers: {}
        '400':
