  /request/vehicle@files:
    post:
      summary: Actualizar documentos de Vehículo
      deprecated: false
      description: >
        Permite actualizar los documentos asociados a un vehículo ya registrado.
        Solo se requiere la patente del vehículo junto con los nuevos documentos
        a cargar. La cantidad, el orden y los nombres definidos en fileName deben
        coincidir con los archivos enviados en files.
      operationId: updateVehicleFilesIndependent
      tags:
        - Gestión de Vehículos
      parameters:
        - name: unassigned
          in: query
          required: true
          schema:
            type: boolean
            example: true
          description: Debe enviarse siempre como `true`.
      requestBody:
        content:
          multipart/form-data:
            encoding:
              vehicle:
                contentType: Datos mínimos del vehículo para actualización de documentos.
              metadata:
                contentType: Metadatos asociados a los documentos del vehículo.
              files:
                contentType: >-
                  Los nombres y cantidad de los archivos deben coincidir con la
                  metadata.
            schema:
              type: object
              properties:
                vehicle:
                  type: object
                  description: Datos mínimos para identificar el vehículo cuya documentación se actualizará.
                  properties:
                    patent:
                      type: string
                      description: Patente del vehículo en formato válido.
                      example: ABCD12
                  required:
                    - patent
                  example: {}
                metadata:
                  type: array
                  description: >-
                    Metadatos asociados a los documentos del vehículo. Cada
                    elemento debe incluir documentType y fileName. La cantidad,
                    el orden y los nombres definidos en fileName deben coincidir
                    con los archivos enviados en files.
                  items:
                    type: object
                    required:
                      - documentType
                      - fileName
                    properties:
                      documentType:
                        type: number
                        description: |-
                          ID del tipo de documento.

                          Valores permitidos:

                          - `24`: Permiso de Circulación
                          - `25`: Revisión Técnica
                          - `26`: SOAP
                        example: 24
                      fileName:
                        type: string
                        description: >-
                          Nombre del archivo enviado en files, incluyendo su extensión. Debe coincidir exactamente con el nombre del archivo adjunto (ej: F30.pdf, cedula-frontal.jpeg).
                        example: permiso-circulacion.pdf
                  example:
                    - documentType: 24
                      fileName: permiso-circulacion.pdf
                    - documentType: 25
                      fileName: revision-tecnica.pdf
                    - documentType: 26
                      fileName: soap.pdf
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: >-
                    Archivos del vehículo. Adjuntar un archivo por cada elemento
                    definido en metadata. La cantidad, el orden y los nombres de
                    los archivos deben coincidir con los valores informados en
                    metadata.fileName.
                  example:
                    - permiso-circulacion.pdf
                    - revision-tecnica.pdf
                    - soap.pdf
              required:
                - vehicle
                - metadata
                - files
            example:
              vehicle:
                patent: ABCD12
              metadata:
                - documentType: 24
                  fileName: permiso-circulacion.pdf
                - documentType: 25
                  fileName: revision-tecnica.pdf
                - documentType: 26
                  fileName: soap.pdf
              files:
                - permiso-circulacion.pdf
                - revision-tecnica.pdf
                - soap.pdf
        required: true
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                actualizacion_exitosa:
                  summary: Documentos actualizados correctamente
                  value:
                    statusCode: 201
                    message: Solicitud de actualizacion de vehiculo recibida y procesando...
          headers: {}
        '400':
          description: Payload inválido o incompleto.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sin_vehicle:
                  summary: Campo vehicle ausente
