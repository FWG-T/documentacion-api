  /request/vehicle:
    post:
      summary: Crear Vehículo
      deprecated: false
      description: >
        Permite registrar un vehículo, incluyendo sus datos principales y
        documentos requeridos según contrato. La obligatoriedad y el tipo de
        documentos dependen de la configuración contractual.
      operationId: upsertIndependentVehicle
      tags:
        - Gestión de Vehículos
      parameters:
        - name: unassigned
          in: query
          required: true
          schema:
            type: boolean
            example: true
          description: Debe enviarse siempre como `true`.
      requestBody:
        content:
          multipart/form-data:
            encoding:
              vehicle:
                contentType: Datos del vehículo para el flujo de creación.
              metadata:
                contentType: Metadatos asociados a los documentos del vehículo.
              files:
                contentType: >-
                  Los nombres y cantidad de los archivos deben coincidir con la
                  metadata.
            schema:
              type: object
              properties:
                vehicle:
                  type: object
                  description: Datos del vehículo a registrar.
                  properties:
                    vehicleType:
                      type: number
                      description: |-
                        ID del tipo de vehículo.

                        Valores permitidos:

                        - `1`: Batea
                        - `2`: Cama baja
                        - `3`: Camión abierto
                        - `4`: Camión cerrado
                        - `5`: Camión pluma
                        - `6`: Cisterna
                        - `7`: Furgón
                        - `8`: Rampla abierta
                        - `9`: Rampla cerrada
                        - `10`: Refrigerado
                        - `11`: Semi baranda
                        - `12`: Sider
                        - `13`: Tracto
                        - `14`: Transportador de vehículos
                        - `15`: Utilitario
                        - `16`: Otro
                        - `17`: Moto
                        - `18`: Acoplado - Semirremolque
                        - `19`: Acoplado - Remolque
                      example: 7
                    patent:
                      type: string
                      description: Patente del vehículo en formato válido.
                      example: ABCD12
                  required:
                    - vehicleType
                    - patent
                  example: {}
                metadata:
                  type: array
                  description: >-
                    Metadatos asociados a los documentos del vehículo. Si se
                    envía este campo, cada elemento debe incluir documentType y
                    fileName. La cantidad, el orden y los nombres definidos en
                    fileName deben coincidir con los archivos enviados en files.
                  items:
                    type: object
                    required:
                      - documentType
                      - fileName
                    properties:
                      documentType:
                        type: number
                        description: |-
                          ID del tipo de documento.

                          Valores permitidos:

                          - `24`: Permiso de Circulación
                          - `25`: Revisión Técnica
                          - `26`: SOAP
                        example: 24
                      fileName:
                        type: string
                        description: >-
                          Nombre del archivo enviado en files, incluyendo su extensión. Debe coincidir exactamente con el nombre del archivo adjunto (ej: F30.pdf, cedula-frontal.jpeg).
                        example: permiso-circulacion.pdf
                  example:
                    - documentType: 24
                      fileName: permiso-circulacion.pdf
                    - documentType: 25
                      fileName: revision-tecnica.pdf
                    - documentType: 26
                      fileName: soap.pdf
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: >-
                    Archivos del vehículo. Adjuntar un archivo por cada elemento
                    definido en metadata. La cantidad, el orden y los nombres de
                    los archivos deben coincidir con los valores informados en
                    metadata.fileName.
                  example:
                    - permiso-circulacion.pdf
                    - revision-tecnica.pdf
                    - soap.pdf
              required:
                - vehicle
            example:
              vehicle:
                vehicleType: 7
                patent: ABCD12
              metadata:
                - documentType: 24
                  fileName: permiso-circulacion.pdf
                - documentType: 25
                  fileName: revision-tecnica.pdf
                - documentType: 26
                  fileName: soap.pdf
              files:
                - permiso-circulacion.pdf
                - revision-tecnica.pdf
                - soap.pdf
        required: true
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                creacion_exitosa:
                  summary: Vehículo creado correctamente
                  value:
                    statusCode: 201
                    message: Solicitud de creacion de vehiculo recibida y en procesamiento
          headers: {}
        '400':
          description: Payload inválido o incompleto.
