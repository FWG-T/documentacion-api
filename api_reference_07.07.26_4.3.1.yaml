  /request/contractor@natural-person@files:
    post:
      summary: Actualizar documentos de Contratista Persona Natural
      deprecated: false
      description: >
        Permite actualizar los documentos asociados a un Contratista Persona
        Natural ya registrado. Solo se requiere el RUT del contratista junto con
        los nuevos documentos a cargar. La cantidad, el orden y los nombres
        definidos en fileName deben coincidir con los archivos enviados en
        files.
      operationId: updateContractorNaturalPersonFilesDoc
      tags:
        - Gestión de Contratista Persona Natural
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            encoding:
              contractor:
                contentType: >-
                  Datos mínimos del Contratista Persona Natural para
                  actualización de documentos.
              metadata:
                contentType: >-
                  Metadatos asociados a los documentos del Contratista Persona
                  Natural.
              files:
                contentType: >-
                  Los nombres y cantidad de los archivos deben coincidir con la
                  metadata.
            schema:
              type: object
              properties:
                contractor:
                  type: object
                  description: >-
                    Datos mínimos para identificar al Contratista Persona
                    Natural cuya documentación se actualizará.
                  properties:
                    rut:
                      type: string
                      description: RUT del contratista en formato con guion y sin puntos.
                      example: 22222222-2
                  required:
                    - rut
                  example: {}
                metadata:
                  type: array
                  description: >-
                    Metadatos asociados a los documentos del Contratista Persona
                    Natural. Cada elemento debe incluir documentType y fileName.
                    La cantidad, el orden y los nombres definidos en fileName
                    deben coincidir con los archivos enviados en files.
                  items:
                    type: object
                    required:
                      - documentType
                      - fileName
                    properties:
                      documentType:
                        type: number
                        description: |-
                          ID del tipo de documento.

                          Valores permitidos:

                          - `30`: Cédula de Identidad
                          - `31`: Licencia de Conducir
                          - `32`: Certificado de Antecedentes
                          - `33`: Hoja de Vida del Conductor
                        example: 30
                      fileName:
                        type: string
                        description: >-
                          Nombre del archivo enviado en files, incluyendo su extensión. Debe coincidir exactamente con el nombre del archivo adjunto (ej: F30.pdf, cedula-frontal.jpeg).
                        example: cedula_frontal.jpeg
                      side:
                        type: string
                        description: >-
                          Lado del documento. Requerido para Cédula de Identidad
                          (tipo 30) y Licencia de Conducir (tipo 31). No debe
                          enviarse para Certificado de Antecedentes (tipo 32)
                          ni Hoja de Vida del Conductor (tipo 33).

                          Valores permitidos:

                          - `frontal`

                          - `trasera`
                        example: frontal
                  example:
                    - documentType: 30
                      fileName: cedula_frontal.jpeg
                      side: frontal
                    - documentType: 30
                      fileName: cedula_trasera.jpeg
                      side: trasera
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: >-
                    Archivos del Contratista Persona Natural. Adjuntar un
                    archivo por cada elemento definido en metadata. La cantidad,
                    el orden y los nombres de los archivos deben coincidir con
                    los valores informados en metadata.fileName.
                  example:
                    - cedula_frontal.jpeg
                    - cedula_trasera.jpeg
              required:
                - contractor
                - metadata
                - files
            example:
              contractor:
                rut: 22222222-2
              metadata:
                - documentType: 30
                  fileName: cedula_frontal.jpeg
                  side: frontal
                - documentType: 30
                  fileName: cedula_trasera.jpeg
                  side: trasera
              files:
                - cedula_frontal.jpeg
                - cedula_trasera.jpeg
        required: true
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                actualizacion_exitosa:
                  summary: Documentos actualizados correctamente
                  value:
                    statusCode: 201
                    message: Solicitud de actualizacion de contratista recibida y procesando...
          headers: {}
        '400':
