              rut:
                type: string
                description: RUT del personal.
                example: 22222222-2
              reason:
                type: string
                nullable: true
                description: Motivo de rechazo del documento, si aplica.
              documentTypeId:
                type: number
                description: |-
                  ID del tipo de documento.

                  Valores permitidos:

                  - `30`: Cédula de Identidad
                  - `31`: Licencia de Conducir
                  - `32`: Certificado de Antecedentes
                  - `33`: Hoja de Vida del Conductor
              documentTypeName:
                type: string
                description: Nombre del tipo de documento.
              documentEntityId:
                type: number
                description: |-
                  ID de la entidad asociada al documento.

                  - `4`: Personal
              documentEntityName:
                type: string
                description: Nombre de la entidad asociada al documento.
              side:
                type: string
                description: Cara del documento (frontal o trasera).
              pendingSide:
                type: boolean
                nullable: true
                description: Indica si falta cargar la otra cara del documento.
              statusId:
                type: number
                description: |-
                  ID del estado del documento.

                  Valores posibles:

                  - `1`: Válido
                  - `2`: Pendiente de subir
                  - `3`: Pendiente de validar
                  - `4`: Rechazado
                  - `5`: Por vencer
                  - `6`: No vigente
                  - `7`: Documento cargado
              statusName:
                type: string
                description: Nombre del estado del documento.
              uploadDate:
                type: string
                nullable: true
                description: Fecha de carga del documento.
              expirationDate:
                type: string
                nullable: true
                description: Fecha de expiración del documento.
              period:
                type: string
                nullable: true
                description: Período asociado al documento, si aplica.
              complementaryData:
                type: object
                nullable: true
                description: Datos complementarios extraídos del documento.
              historySpan:
                nullable: true
                description: Rango histórico asociado al documento, si aplica.
              complementaryDocumentFields:
                type: array
                nullable: true
                description: Campos complementarios adicionales del documento.
                items:
                  type: object
              url:
                type: string
                nullable: true
                description: URL del documento.
        Staff:
          type: string
          description: RUT del personal consultado.
          example: 22222222-2
        documento:
          type: string
          description: Tipo de entidad consultada.
    ContractorCompanyDocumentBase:
      type: object
      description: Campos comunes a todos los documentos de Contratista Empresa.
      properties:
        documentTypeId:
          type: number
          description: |-
            ID del tipo de documento.

            Valores permitidos:

            - `16`: F30 (Total pagos)
            - `17`: F30-1 (Pagos individuales)
            - `18`: Carpeta Tributaria
        documentTypeName:
          type: string
          description: Nombre del tipo de documento.
        documentEntityId:
          type: number
          description: |-
            ID de la entidad asociada al documento.

            - `1`: Contratista Empresa
        documentEntityName:
          type: string
          description: Nombre de la entidad asociada al documento.
        contentType:
          type: string
          nullable: true
          description: |-
            Tipo de contenido del archivo.

            Valores posibles:

            - `application/pdf`
            - `image/jpeg`
            - `image/png`
        statusId:
          type: number
          description: |-
            ID del estado del documento.

            Valores posibles:

            - `1`: Válido
            - `2`: Pendiente de subir
            - `3`: Pendiente de validar
            - `4`: Rechazado
            - `5`: Por vencer
            - `6`: No vigente
            - `7`: Documento cargado
        statusName:
          type: string
          description: Nombre del estado del documento.
        url:
          type: string
          nullable: true
          description: URL del documento.
        createdAt:
          type: string
          format: date-time
          description: Fecha de creación del documento.
        updatedAt:
          type: string
          format: date-time
          description: Fecha de última actualización del documento.
      required:
        - documentTypeId
        - documentTypeName
        - documentEntityId
        - documentEntityName
        - statusId
        - statusName
    ContractorCompanyDocumentF30:
      allOf:
        - $ref: '#/components/schemas/ContractorCompanyDocumentBase'
        - type: object
          description: Respuesta del documento F30 (Total pagos) para Contratista Empresa.
          properties:
            deletedAt:
              type: string
              nullable: true
              description: Fecha de eliminación del documento, si aplica.
            certificateNumber:
              type: string
              nullable: true
              description: Número de certificado del F30.
            companyData:
              type: object
              nullable: true
              description: Datos de la empresa extraídos del F30.
              properties:
                companyRut:
                  type: string
                  description: RUT de la empresa.
                companyName:
                  type: string
                  description: Nombre de la empresa.
                representRut:
                  type: string
                  description: RUT del representante legal.
                representName:
                  type: string
                  description: Nombre del representante legal.
                economicActivityCode:
                  type: string
                  description: Código de actividad económica.
            executedFines:
              type: array
              nullable: true
              description: Multas ejecutadas detectadas en el F30.
              items:
                type: object
            socialSecurityDebts:
              type: array
              nullable: true
              description: Deudas previsionales detectadas en el F30.
              items:
                type: object
            fineResolutions:
              type: array
              nullable: true
              description: Resoluciones de multas detectadas en el F30.
              items:
                type: object
            generationDate:
              type: string
              nullable: true
              description: Fecha de generación del documento original.
            isLaborCertificate:
              type: boolean
              nullable: true
              description: Indica si el documento corresponde a un certificado laboral.
            hasViolations:
              type: boolean
              nullable: true
              description: Indica si el documento registra infracciones.
            isReadable:
              type: boolean
              nullable: true
              description: Indica si el documento fue legible para la IA.
            isValid:
              type: boolean
              nullable: true
              description: Indica si el documento fue validado como vigente.
            confidence:
              type: number
              nullable: true
              description: Nivel de confianza de la lectura del documento, expresado en porcentaje.
    ContractorCompanyDocumentF301:
      allOf:
        - $ref: '#/components/schemas/ContractorCompanyDocumentBase'
        - type: object
          description: Respuesta del documento F30-1 (Pagos individuales) para Contratista Empresa.
          properties:
            certificateNumber:
              type: string
              nullable: true
              description: Número de certificado del F30-1.
            key:
              type: string
              nullable: true
              description: Clave de verificación del certificado.
            extractionDate:
              type: string
              nullable: true
              description: Fecha de extracción del documento.
            certificateInfo:
              type: object
              nullable: true
              description: Información general del certificado.
              properties:
                totalWorkers:
                  type: number
                  description: Total de trabajadores incluidos en el certificado.
            employerInfo:
              type: object
              nullable: true
              description: Información del empleador.
              properties:
                rut:
                  type: string
                  description: RUT del empleador.
                email:
                  type: string
                  description: Correo electrónico del empleador.
                phone:
                  type: string
                  description: Teléfono del empleador.
                number:
                  type: string
                  description: Número de dirección del empleador.
                region:
                  type: string
                  description: Región del empleador.
                street:
                  type: string
                  description: Calle del empleador.
                commune:
                  type: string
                  description: Comuna del empleador.
                apartment:
                  type: string
                  description: Departamento o piso del empleador.
                companyName:
                  type: string
                  description: Nombre de la empresa del empleador.
                economicActivity:
                  type: string
                  description: Actividad económica del empleador.
                legalRepresentative:
                  type: string
                  description: Nombre del representante legal.
                legalRepresentativeRut:
                  type: string
                  description: RUT del representante legal.
            mainCompanyInfo:
              type: object
              nullable: true
              description: Información de la empresa mandante.
              properties:
                rut:
                  type: string
                  description: RUT de la empresa mandante.
                number:
                  type: string
                  description: Número de dirección de la empresa mandante.
                region:
                  type: string
                  description: Región de la empresa mandante.
                street:
                  type: string
                  description: Calle de la empresa mandante.
                commune:
                  type: string
                  description: Comuna de la empresa mandante.
                companyName:
                  type: string
                  description: Nombre de la empresa mandante.
                legalRepresentative:
                  type: string
                  description: Nombre del representante legal de la empresa mandante.
                legalRepresentativeRut:
                  type: string
                  description: RUT del representante legal de la empresa mandante.
            contractorCompanyInfo:
              nullable: true
              description: Información de la empresa contratista, si aplica.
            workProjectInfo:
              type: object
              nullable: true
              description: Información de la obra o proyecto.
              properties:
                workType:
                  type: string
                  description: Tipo de obra (Pública o Privada).
                workNumber:
                  type: string
                  description: Número de la obra.
                workRegion:
                  type: string
                  description: Región donde se ejecuta la obra.
                mainCompany:
                  type: string
                  description: Nombre de la empresa mandante de la obra.
                workAddress:
                  type: string
                  description: Dirección de la obra.
                workCommune:
                  type: string
                  description: Comuna de la obra.
                contractName:
                  type: string
                  description: Nombre del contrato asociado.
                participationMode:
                  type: string
                  description: Modo de participación en la obra (ej. Contratista).
            periods:
              type: array
              nullable: true
              description: Períodos incluidos en el certificado.
              items:
                type: object
                properties:
                  objective:
                    type: string
                    description: Objetivo del período.
                  institution:
                    type: string
                    description: Institución previsional del período.
            periodDetail:
              type: array
              nullable: true
              description: Detalle por período.
              items:
                type: object
                properties:
                  year:
                    type: number
                    description: Año del período.
                  period:
                    type: string
                    description: Mes del período.
                  workers:
                    type: object
                    description: Información de trabajadores del período.
                    properties:
                      total:
                        type: number
                        description: Total de trabajadores.
                      sacked:
                        type: number
                        description: Trabajadores despedidos.
                  contributions:
                    type: object
                    description: Estado de las cotizaciones.
                    properties:
                      paid:
                        type: boolean
                        description: Indica si las cotizaciones están pagadas.
                      payrollAttached:
                        type: boolean
                        description: Indica si se adjuntó la nómina.
                  remuneraciones:
                    type: object
                    description: Detalle de remuneraciones.
                    properties:
                      paid:
                        type: number
                        description: Total de remuneraciones pagadas.
                      unpaid:
                        type: number
                        description: Total de remuneraciones no pagadas.
                      reportedAmount:
                        type: string
                        description: Monto reportado.
                  noticeIndemnification:
                    type: object
                    description: Indemnización por aviso previo.
                    properties:
                      paid:
                        type: string
                        description: Monto pagado por indemnización de aviso previo.
                      unpaid:
                        type: string
                        description: Monto no pagado por indemnización de aviso previo.
                      reportedAmount:
                        type: string
                        description: Monto reportado por indemnización de aviso previo.
                  serviceIndemnification:
                    type: object
                    description: Indemnización por años de servicio.
                    properties:
                      paid:
                        type: string
                        description: Monto pagado por indemnización de años de servicio.
                      unpaid:
                        type: string
                        description: Monto no pagado por indemnización de años de servicio.
                      reportedAmount:
                        type: string
                        description: Monto reportado por indemnización de años de servicio.
            workers:
              type: array
              nullable: true
              description: Trabajadores incluidos en el certificado.
              items:
                type: object
                properties:
                  rut:
                    type: string
                    description: RUT del trabajador.
                  name:
                    type: string
                    description: Nombre del trabajador.
                  number:
                    type: number
                    description: Número de orden del trabajador.
                  period:
                    nullable: true
                    description: Período asociado al trabajador, si aplica.
            verificationInfo:
              type: object
              nullable: true
              description: Información de verificación del certificado.
              properties:
                key:
                  type: string
                  description: Clave de verificación.
                verificationUrl:
                  type: string
                  description: URL del verificador oficial.
                certificateNumber:
                  type: string
                  description: Número de certificado a verificar.
            verificationResult:
              type: object
              nullable: true
              description: Resultado de la verificación en línea.
              properties:
                error:
                  nullable: true
                  description: Error de verificación, si ocurrió.
                message:
                  type: string
                  description: Mensaje del resultado de verificación.
                verified:
                  type: boolean
                  description: Indica si el certificado fue verificado exitosamente.
                verificationDate:
                  type: string
                  description: Fecha y hora de la verificación.
            dataIntegrity:
              type: object
              nullable: true
              description: Resultado del análisis de integridad del documento.
              properties:
                isAuthentic:
                  type: boolean
                  description: Indica si el documento es auténtico.
                discrepancies:
                  type: array
                  description: Lista de discrepancias encontradas.
                  items:
                    type: object
                confidenceScore:
                  type: number
                  description: Puntaje de confianza de la verificación.
                discrepanciesCount:
                  type: number
                  description: Número de discrepancias encontradas.
                matchedFieldsCount:
                  type: number
                  description: Número de campos que coinciden.
                totalFieldsCompared:
                  type: number
                  description: Total de campos comparados.
                verificationSummary:
                  type: string
                  description: Resumen del resultado de la verificación.
    ContractorCompanyDocumentTaxFolder:
      allOf:
        - $ref: '#/components/schemas/ContractorCompanyDocumentBase'
        - type: object
          description: Respuesta del documento Carpeta Tributaria para Contratista Empresa.
    ContractorCompanyDocumentConsultationResponse:
      type: object
      description: >-
        Respuesta de consulta de documentos de Contratista Empresa.
        El array `data` puede contener documentos de tipo F30, F30-1 o Carpeta Tributaria,
        cada uno con campos específicos según su tipo.
      properties:
        data:
          type: array
          description: Lista de documentos. Los campos de cada item varían según `documentTypeId`.
          items:
            oneOf:
              - $ref: '#/components/schemas/ContractorCompanyDocumentF30'
              - $ref: '#/components/schemas/ContractorCompanyDocumentF301'
              - $ref: '#/components/schemas/ContractorCompanyDocumentTaxFolder'
            discriminator:
              propertyName: documentTypeId
              mapping:
                '16': '#/components/schemas/ContractorCompanyDocumentF30'
                '17': '#/components/schemas/ContractorCompanyDocumentF301'
                '18': '#/components/schemas/ContractorCompanyDocumentTaxFolder'
        contratista:
          type: string
          description: RUT del contratista consultado.
          example: 76000000-0
        documento:
          type: string
          description: Tipo de entidad consultada.
    RelationErrorResponse:
      type: object
      properties:
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: Mensaje descriptivo del error.
        error:
          type: string
          description: Código o descripción del error.
        statusCode:
          type: integer
          description: Código HTTP del error.
      required:
        - message
        - error
        - statusCode
    ConsultationErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          description: Código HTTP del error.
          example: 400
        timestamp:
          type: string
          format: date-time
          description: Fecha y hora en que ocurrió el error (ISO 8601).
        path:
          type: string
          description: Ruta del endpoint que generó el error.
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: Mensaje descriptivo del error.
      required:
        - statusCode
        - message
    NotFoundResponse:
      type: object
      properties:
        statusCode:
          type: integer
          description: Código HTTP del error.
          example: 404
        timestamp:
          type: string
          format: date-time
          description: Fecha y hora en que ocurrió el error (ISO 8601).
        path:
          type: string
          description: Ruta del endpoint que generó el error.
        message:
          type: string
          description: Mensaje descriptivo del error.
      required:
        - statusCode
        - message
    GroupAssociationSuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: Vehiculo asignado correctamente
        success:
          type: boolean
          example: true
      required:
        - message
        - success
    EntityConsultationResponse:
      type: object
      description: Respuesta de consulta de información de entidad.
      additionalProperties: true
      properties: {}
    DocumentConsultationResponse:
      type: object
      description: Respuesta de consulta de documentos de entidad.
      additionalProperties: true
      properties: {}
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: apikey
servers:
  - url: https://api.example.com
    description: Documentación
security: []
