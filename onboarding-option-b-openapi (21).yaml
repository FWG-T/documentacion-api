  /webhooks/configuration:
    post:
      tags: [Configuración Webhook]
      summary: Configuración de webhooks y eventos disponibles
      description: |
      
        Esta guía describe los pasos necesarios y el funcionamiento del webhook utilizado
        para recibir notificaciones de Testia en tiempo real.

        El webhook es un mecanismo que permite a Api-Testia notificar eventos importantes
        a tu sistema en tiempo real. A través de este mecanismo, podrás recibir notificaciones
        sobre estados de documentos e información de personal, vehículos y contratistas,
        directamente en un endpoint definido por tu aplicacion.

        Para que Testia pueda enviar notificaciones a tu sistema, debes proporcionar una URL
        de recepción donde se enviarán los eventos mediante HTTP POST.

        Funcionamiento:
        - Notificación a Testia: el administrador que desee recibir notificaciones debe
          informar a Testia la URL donde desea recibir los eventos.
        - Método de envío: todas las notificaciones se envían por HTTP POST.
        - Formato del contenido: el payload del webhook se envía en JSON.

        Estructura base del mensaje:
        - `action`: acción realizada.
        - `status`: estado de la operación.
        - `operationType`: tipo de operación.
        - `entity`: entidad sobre la que se realizó la operación.
        - `description`: descripción del evento.
        - `timestamp`: marca temporal del evento en formato ISO 8601.
        - `payload`: objeto con la información relacionada.

        Los ejemplos de salida por entidad y tipo de evento se documentan en los
        endpoints específicos:
        - `/webhooks/contractor`
        - `/webhooks/contractor@natural-person`
        - `/webhooks/staff`
        - `/webhooks/vehicle`

        Nota: esta entrada es informativa para onboarding. La configuración operacional
        se define según la guía pública y la coordinación con el equipo Testia.
      operationId: webhookConfigurationGuide
      responses:
        '200':
          description: Información de referencia para configuración de webhook.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventOutput'
        '400':
          description: Solicitud incorrecta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
