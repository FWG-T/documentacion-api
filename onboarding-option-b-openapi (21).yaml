openapi: 3.0.3
info:
  title: Testia Onboarding API - Flujo Guiado
  version: 1.2.0
  license:
    name: Proprietary
    url: https://www.testia.cl
  description: |
      API para la creación, activación y desactivación de contratistas, vehículos y personal, incluyendo la actualización de sus documentos de manera centralizada.
  x-last-updated: 2026-05-15
servers:
  - url: "{base_url}"
    variables:
      base_url:
        default: "https://backend.testia.cl"
        description: URL base de la API. Reemplazar {base_url} con la URL de tu ambiente.
security:
  - ApiKeyAuth: []
tags:
  - name: Acceso y Autenticación
    description: |
      Todos los endpoints de esta API requieren autenticación mediante API key.
      La API key debe enviarse en el header `apikey` en cada solicitud.

      Durante el proceso de onboarding, Testia habilitará un usuario con acceso
      al portal API autorizado para el cliente. Desde ese portal podrás visualizar
      y gestionar tu API key.

      Si necesitas renovar tu API key o tienes dudas de acceso,
      contacta al equipo Testia en contacto@testia.cl.
  - name: Gestión de contratista empresa
    description: Registro de contratista empresa.
  - name: Gestión de contratista persona natural
    description: Registro de contratista persona natural.
  - name: Gestión de personal
    description: Registro de personal asociado a contratista.
  - name: Gestión de vehículos
    description: Registro de vehículos asociados a contratista.
  - name: Gestión Grupos y Etiquetas
    description: |
      Gestión de asociaciones entre contratistas, vehículos y personal.
      Incluye consultas, asignación y desasignación de relaciones.
  - name: Configuración Webhook
    description: Guía de configuración y eventos del webhook de notificaciones de Testia.
paths:
  /request/contractor:
    post:
      tags: [Gestión de contratista empresa]
      summary: Crear contratista empresa
      description: |
        Permite registrar un contratista empresa, incluyendo sus datos principales, representante y documentos requeridos según contrato.
        La obligatoriedad y el tipo de documentos dependen de la configuración contractual.
      operationId: createContractor
      requestBody:
        required: true
        description: |
          Carga de un nuevo contratista empresa con su representante y documentos asociados.
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContractorCompanyMultipartRequest'
            examples:
              empresa:
                summary: Ejemplo exitoso empresa
                value:
                  contractor:
                    contractorTypeId: 1
                    rut: "76000000-0"
                    businessName: "EMPRESA S.A."
                    serviceTypeId: 1
                    reviewStartDate: "2025-01-13T02:59:00.000Z"
                    reviewEndDate: "2027-01-13T02:59:00.000Z"
                    reviewCompaniesId: []
                  contractorPartner:
                    rut: "14260894-4"
                    name: "Nombre"
                    lastName: "Dummy"
                    email: "dummy.partner@testia.cl"
                    phoneNumber: "+56987654321"
                  metadata:
                    - fileName: F30_dummy.pdf
                      documentType: 16
                      documentEntity: 1
                  files:
                    - F30_dummy.pdf
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                empresa:
                  summary: Ejemplo exitoso empresa
                  value:
                    statusCode: 201
                    message: Contratista empresa creado correctamente
        '400':
          description: "Payload inválido o incompleto (ejemplo: falta rut, businessName, contractorPartner, peso excesivo, etc)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                header_companyid_requerido:
                  summary: Header x-consumer-custom-id ausente
                  value:
                    statusCode: 400
                    message: Header companyId es requerido
                    error: Bad Request
                error_interno_guard:
                  summary: Error interno al validar contrato/empresa
                  value:
                    statusCode: 400
                    message: Error interno, intente nuevamente
                    error: Bad Request
                sin_rut:
                  summary: Falta campo rut
                  value:
                    statusCode: 400
                    message: Campo rut es obligatorio
                    error: ValidationError
                sin_businessName:
                  summary: Falta campo businessName
                  value:
                    statusCode: 400
                    message: Campo businessName es obligatorio
                    error: ValidationError
                payload_invalido:
                  summary: Payload inválido o incompleto
                  value:
                    statusCode: 400
                    message: Payload inválido o incompleto
                    error: ValidationError
                sin_contractorPartner:
                  summary: Falta campo contractorPartner
                  value:
                    statusCode: 400
                    message: Campo contractorPartner es obligatorio
                    error: ValidationError
                peso_excesivo:
                  summary: Archivo adjunto excede el tamaño permitido
                  value:
                    statusCode: 400
                    message: Tamaño máximo de archivo excedido
                    error: PayloadTooLarge
                metadata_files_mismatch:
                  summary: Cantidad de archivos no coincide con metadata
                  value:
                    statusCode: 400
                    timestamp: "2026-05-20T13:02:53.690Z"
                    path: /request/contractor
                    message: La cantidad de archivos debe ser igual que metadatos
                    errorType: Bad Request
        '401':
          description: API key ausente o invalida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
              examples:
                no_autorizado:
                  summary: API key ausente o invalida
                  value:
                    message: Unauthorized
                    request_id: fd49b7506711ab474ebb396eb7d07c45
        '403':
          description: Empresa o contrato sin habilitación para uso de API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                empresa_no_encontrada:
                  summary: Empresa inexistente
                  value:
                    statusCode: 403
                    message: Empresa no encontrada
                    error: c001
                empresa_no_habilitada:
                  summary: Empresa inactiva
                  value:
                    statusCode: 403
                    message: Empresa no habilitada
                    error: c001
                contrato_no_encontrado:
                  summary: Empresa sin contrato asociado
                  value:
                    statusCode: 403
                    message: Contrato no encontrado
                    error: c001
                contrato_no_vigente:
                  summary: Contrato expirado o no iniciado
                  value:
                    statusCode: 403
                    message: Contrato no vigente
                    error: c001
                api_use_inactivo:
                  summary: Contrato vigente sin apiUse habilitado
                  value:
                    statusCode: 403
                    message: Empresa no tiene activa el uso de la API
                    error: c003
        '409':
          description: Conflicto por entidad ya existente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                conflicto_entidad:
                  summary: Entidad ya existente
                  value:
                    statusCode: 409
                    message: Conflicto por entidad ya existente
                    error: Conflict
        '500':
          description: Error interno no controlado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_interno:
                  summary: Fallo interno del servicio
                  value:
                    statusCode: 500
                    message: Error interno del servidor
                    error: Internal Server Error
