  /consultation/contractor/{rutContractor}:
    get:
      tags: [Gestión de contratista empresa]
      summary: Consultar contratista empresa
      description: Obtiene información de un contratista empresa por su RUT.
      operationId: getContractorInformation
      servers:
        - url: "{base_url}/information"
          variables:
            base_url:
              default: 'https://backend.testia.cl'
          description: URL publica de consultas
      parameters:
        - name: rutContractor
          in: path
          required: true
          description: RUT del contratista.
          schema:
            type: string
            example: 99999999-9
      responses:
        '200':
          description: Datos obtenidos exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityConsultationResponse'
              examples:
                consulta_exitosa:
                  summary: Consulta exitosa
                  value:
                    rut: 99999999-9
                    name: Contratista Ejemplo
        '400':
          description: Solicitud incorrecta o contratista no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                contratista_no_encontrado:
                  summary: Contratista no encontrado
                  value:
                    statusCode: 400
                    timestamp: "2026-05-22T18:56:45.321Z"
                    path: "/consultation/contractor/99999999-9"
                    message: Contratista no encontrado
                solicitud_incorrecta:
                  summary: RUT con formato inválido
                  value:
                    statusCode: 400
                    message: Solicitud incorrecta
                    error: ValidationError
        '401':
          description: No autorizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                no_autorizado:
                  summary: No autorizado
