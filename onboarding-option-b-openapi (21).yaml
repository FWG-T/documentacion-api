                    statusCode: 401
                    message: No autorizado
                    error: Unauthorized
        '403':
          description: Empresa o contrato sin habilitación para uso de API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                empresa_no_encontrada:
                  summary: Empresa inexistente
                  value:
                    statusCode: 403
                    message: Empresa no encontrada
                    error: c001
                empresa_no_habilitada:
                  summary: Empresa inactiva
                  value:
                    statusCode: 403
                    message: Empresa no habilitada
                    error: c001
                contrato_no_encontrado:
                  summary: Empresa sin contrato asociado
                  value:
                    statusCode: 403
                    message: Contrato no encontrado
                    error: c001
                contrato_no_vigente:
                  summary: Contrato expirado o no iniciado
                  value:
                    statusCode: 403
                    message: Contrato no vigente
