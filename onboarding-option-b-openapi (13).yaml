  /webhooks/configuration:
    post:
      tags: [Configuracion Webhook]
      summary: Configuracion de webhooks y eventos disponibles
      description: |
      
        Esta guia describe los pasos necesarios y el funcionamiento del webhook utilizado
        para recibir notificaciones de Testia en tiempo real.

        El webhook es un mecanismo que permite a Api-Testia notificar eventos importantes
        a tu sistema en tiempo real. A traves de este mecanismo, podras recibir notificaciones
        sobre estados de documentos e informacion de personal, vehiculos y contratistas,
        directamente en un endpoint definido por tu aplicacion.

        Para que Testia pueda enviar notificaciones a tu sistema, debes proporcionar una URL
        de recepcion donde se enviaran los eventos mediante HTTP POST.

        Funcionamiento:
        - Notificacion a Testia: el administrador que desee recibir notificaciones debe
          informar a Testia la URL donde desea recibir los eventos.
        - Metodo de envio: todas las notificaciones se envian por HTTP POST.
        - Formato del contenido: el payload del webhook se envia en JSON.

        Estructura base del mensaje:
        - `action`: accion realizada.
        - `status`: estado de la operacion.
        - `operationType`: tipo de operacion.
        - `entity`: entidad sobre la que se realizo la operacion.
        - `description`: descripcion del evento.
        - `timestamp`: marca temporal del evento en formato ISO 8601.
        - `payload`: objeto con la informacion relacionada.

        Tipos de evento, descripcion y ejemplo de salida se muestran como ejemplos
        individuales en la respuesta para facilitar su seleccion en Swagger/OpenAPI.

        Nota: esta entrada es informativa para onboarding. La configuracion operacional
        se define segun la guia publica y la coordinacion con el equipo Testia.
      operationId: webhookConfigurationGuide
      responses:
        '200':
          description: Informacion de referencia para configuracion de webhook.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventOutput'
              examples:
                create_staff:
                  summary: Create-Staff
                  value:
                    action: staff.create
                    status: success
                    operationType: create
                    entity: staff
                    description: creacion de personal
                    timestamp: '2026-05-14T10:00:00.000Z'
                    payload:
