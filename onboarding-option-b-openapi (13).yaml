openapi: 3.0.3
info:
  title: Testia Onboarding API - Flujo Guiado
  version: 1.2.0
  license:
    name: Proprietary
    url: https://www.testia.cl
  description: |
      API para la creación, activación y desactivación de contratistas, vehículos y personal, incluyendo la actualización de sus documentos de manera centralizada.
  x-last-updated: 2026-05-15
servers:
  - url: "{base_url}"
    variables:
      base_url:
        default: ""
        description: URL base de la API. Reemplazar {{base_url}} con la URL de tu ambiente.
security:
  - ApiKeyAuth: []
tags:
  - name: Acceso y Autenticacion
    description: |
      Todos los endpoints de esta API requieren autenticacion mediante API key.
      La API key debe enviarse en el header `apikey` en cada solicitud.

      Durante el proceso de onboarding, Testia habilitara un usuario con acceso
      al portal API autorizado para el cliente. Desde ese portal podras visualizar
      y gestionar tu API key.

      Si necesitas renovar tu API key o tienes dudas de acceso,
      contacta al equipo Testia en contacto@testia.cl.
  - name: Contratista Empresa
    description: Registro de contratista empresa.
  - name: Contratista Persona Natural
    description: Registro de contratista persona natural.
  - name: Gestion de Personal
    description: Registro de personal asociado a contratista.
  - name: Gestion de Vehiculos
    description: Registro de vehiculos asociados a contratista.
  - name: Consultas Entidades
    description: |
      Consultas de informacion de contratistas, vehiculos y personal mediante la ruta publica `information`.
      Incluye consultas de entidades independientes y asociadas a contratista.
  - name: Consultas Documentos
    description: |
      Consultas de documentos de contratistas, vehiculos y personal mediante la ruta publica `information`.
      Incluye consultas de documentos de entidades independientes y asociadas a contratista.
  - name: Grupos y Etiquetas Consultas
    description: |
      Consultas de contratistas asociados a entidades en ms-groups.
      **IMPORTANTE**: Estos endpoints requieren acceso directo al servicio `ms-groups-tags`.
      En el ambiente DEV, Kong no tiene rutas externas configuradas para `/dev/msgroups`.
      Validar con el equipo Testia la URL de acceso habilitada para tu ambiente.
  - name: Grupos y Etiquetas Asignacion
    description: |
      Asociacion de contratistas a vehiculos o personal en ms-groups.
      **IMPORTANTE**: Estos endpoints requieren acceso directo al servicio `ms-groups-tags`.
      En el ambiente DEV, Kong no tiene rutas externas configuradas para `/dev/msgroups`.
      Validar con el equipo Testia la URL de acceso habilitada para tu ambiente.
  - name: Grupos y Etiquetas Desasignacion
    description: |
      Desasociacion de contratistas a vehiculos o personal en ms-groups.
      **IMPORTANTE**: Estos endpoints requieren acceso directo al servicio `ms-groups-tags`.
      En el ambiente DEV, Kong no tiene rutas externas configuradas para `/dev/msgroups`.
      Validar con el equipo Testia la URL de acceso habilitada para tu ambiente.
  - name: Configuracion Webhook
    description: Guia de configuracion y eventos del webhook de notificaciones de Testia.
paths:
  /request/contractor:
    post:
      tags: [Contratista Empresa]
      summary: Crear contratista empresa
      description: |
        Permite registrar una empresa contratista, incluyendo sus datos principales, representante y documentos requeridos según contrato. La obligatoriedad y el tipo de documentos dependen de la configuración contractual.
      operationId: createContractorCompany
      requestBody:
        required: true
        description: |
          Carga de una nueva empresa contratista con su representante y documentos asociados.
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContractorCompanyMultipartRequest'
            examples:
              empresa:
                summary: Ejemplo exitoso empresa
                value:
                  contractor:
                    contractorTypeId: 1
                    rut: "76000000-0"
                    businessName: "EMPRESA S.A."
                    serviceTypeId: 1
                    reviewStartDate: "2025-01-13T02:59:00.000Z"
                    reviewEndDate: "2027-01-13T02:59:00.000Z"
                    reviewCompaniesId: []
                  contractorPartner:
                    rut: "14260894-4"
                    name: "Nombre"
                    lastName: "Dummy"
                    email: "dummy.partner@testia.cl"
                    phoneNumber: "+56987654321"
                  metadata:
                    - fileName: F30_dummy.pdf
                      documentType: 16
                      documentEntity: 1
                  files:
                    - F30_dummy.pdf
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                empresa:
                  summary: Ejemplo exitoso empresa
                  value:
                    statusCode: 201
                    message: Contratista empresa creado correctamente
        '400':
          description: "Payload inválido o incompleto (ejemplo: falta rut, businessName, contractorPartner, peso excesivo, etc)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sin_rut:
                  summary: Falta campo rut
                  value:
                    statusCode: 400
                    message: Campo rut es obligatorio
                    error: ValidationError
                sin_businessName:
                  summary: Falta campo businessName
                  value:
                    statusCode: 400
                    message: Campo businessName es obligatorio
                    error: ValidationError
                sin_contractorPartner:
                  summary: Falta campo contractorPartner
                  value:
                    statusCode: 400
                    message: Campo contractorPartner es obligatorio
                    error: ValidationError
                peso_excesivo:
                  summary: Archivo adjunto excede el tamaño permitido
                  value:
                    statusCode: 400
                    message: Tamaño máximo de archivo excedido
                    error: PayloadTooLarge
                metadata_files_mismatch:
                  summary: Cantidad de archivos no coincide con metadata
                  value:
                    statusCode: 400
                    timestamp: "2026-05-20T13:02:53.690Z"
                    path: /request/contractor
                    message: La cantidad de archivos debe ser igual que metadatos
                    errorType: Bad Request
        '401':
          description: API key ausente o invalida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
              examples:
                no_autorizado:
                  summary: API key ausente o invalida
                  value:
                    message: Unauthorized
                    request_id: fd49b7506711ab474ebb396eb7d07c45
        '409':
          description: Conflicto por entidad ya existente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                conflicto_entidad:
                  summary: Entidad ya existente
                  value:
                    statusCode: 409
                    message: Conflicto por entidad ya existente
                    error: Conflict

  /request/contractor@natural-person:
    post:
      tags: [Contratista Persona Natural]
      summary: Crear contratista persona natural
      description: |
        Permite registrar un contratista persona natural, incluyendo sus datos principales, representante y documentos requeridos según contrato. La obligatoriedad y el tipo de documentos dependen de la configuración contractual.
      operationId: createContractorNaturalPerson
      requestBody:
        required: true
        description: |
          Carga de un nuevo contratista persona natural con su representante y documentos asociados.
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContractorNaturalPersonMultipartRequest'
            examples:
              persona_natural:
                summary: Ejemplo exitoso persona natural
                value:
                  contractor:
                    contractorTypeId: 2
                    name: "Nombre"
                    lastName: "Dummy"
                    mothersLastName: "Demo"
                    rut: "22222222-2"
                    serviceTypeId: 1
                    reviewStartDate: "2025-01-13T02:59:00.000Z"
                    reviewEndDate: "2027-01-13T02:59:00.000Z"
                    reviewCompaniesId: []
                  contractorPartner:
                    rut: "22222222-2"
                    name: "Nombre"
                    lastName: "Dummy Demo"
                    email: "dummy.np@testia.cl"
                    phoneNumber: "+56911111111"
                  metadata:
                    - fileName: cedula_dummy_frontal.jpeg
                      documentType: 30
                      side: frontal
                    - fileName: cedula_dummy_trasera.jpeg
                      documentType: 30
                      side: trasera
                    - fileName: licencia_dummy_frontal.jpeg
                      documentType: 31
                      side: frontal
                    - fileName: licencia_dummy_trasera.jpeg
                      documentType: 31
                      side: trasera
                  files:
                    - cedula_dummy_frontal.jpeg
                    - cedula_dummy_trasera.jpeg
                    - licencia_dummy_frontal.jpeg
                    - licencia_dummy_trasera.jpeg
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                persona_natural:
                  summary: Ejemplo exitoso persona natural
                  value:
                    statusCode: 201
                    message: Contratista persona natural creado correctamente
        '400':
          description: "Payload inválido o incompleto (ejemplo: falta rut, name, contractorPartner, peso excesivo, etc)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                payload_invalido:
                  summary: Payload inválido o incompleto
                  value:
                    statusCode: 400
                    message: Payload inválido o incompleto
                    error: ValidationError
                metadata_files_mismatch:
                  summary: Cantidad de archivos no coincide con metadata
                  value:
                    statusCode: 400
                    timestamp: "2026-05-20T13:02:53.690Z"
                    path: /request/contractor
                    message: La cantidad de archivos debe ser igual que metadatos
                    errorType: Bad Request
        '401':
          description: API key ausente o invalida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
              examples:
                no_autorizado:
                  summary: API key ausente o invalida
                  value:
                    message: Unauthorized
                    request_id: fd49b7506711ab474ebb396eb7d07c45
        '409':
          description: Conflicto por entidad ya existente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                conflicto_entidad:
                  summary: Entidad ya existente
                  value:
                    statusCode: 409
                    message: Conflicto por entidad ya existente
                    error: Conflict
  /request/contractor@files:
    post:
      tags: [Contratista Empresa]
      summary: Actualizar documentos de contratista empresa
      description: |
        Permite actualizar los documentos asociados a una empresa contratista ya registrada. Para realizar la actualización, se debe enviar el RUT del contratista y los nuevos documentos a cargar. La correspondencia entre los metadatos y los documentos adjuntos debe ser exacta.
      operationId: updateContractorFilesDoc
      requestBody:
        required: true
        description: |

        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContractorCompanyFilesUpdateMultipartRequest'
            examples:
              empresa_actualizacion:
                summary: Ejemplo de actualización de documentos empresa
                value:
                  contractor:
                    rut: "76000000-0"
                  metadata:
                    - fileName: F30_dummy.pdf
                      documentType: 16
                      documentEntity: 1
                  files:
                    - F30_dummy.pdf
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                archivos_actualizados:
                  summary: Archivos actualizados exitosamente
                  value:
                    statusCode: 201
                    message: Documentos del contratista empresa actualizados correctamente
        '400':
          description: "Payload inválido o incompleto (ejemplo: falta rut, metadata-files no coinciden, peso excesivo, etc)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                metadata_files_mismatch:
                  summary: Metadata y archivos no coinciden
                  value:
                    statusCode: 400
                    message: Los nombres y cantidad de archivos deben coincidir con metadata
                    error: ValidationError
                peso_excesivo:
                  summary: Archivo excede tamaño permitido
                  value:
                    statusCode: 400
                    message: Tamaño máximo de archivo excedido
                    error: PayloadTooLarge
                rut_invalido:
                  summary: RUT faltante o invalido
                  value:
                    statusCode: 400
                    message: Campo rut es obligatorio o tiene formato inválido
                    error: ValidationError
        '401':
          description: API key ausente o invalida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
              examples:
                no_autorizado:
                  summary: API key ausente o invalida
                  value:
                    message: Unauthorized
                    request_id: fd49b7506711ab474ebb396eb7d07c45
        '404':
          description: Contratista no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                contratista_no_encontrado:
                  summary: Contratista no encontrado
                  value:
                    statusCode: 404
                    message: Contratista no encontrado
                    error: NotFound
        '409':
          description: Conflicto por entidad ya existente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                conflicto_entidad:
                  summary: Entidad ya existente
                  value:
                    statusCode: 409
                    message: Conflicto por entidad ya existente
                    error: Conflict
  /request/contractor@natural-person@files:
    post:
      tags: [Contratista Persona Natural]
      summary: Actualizar documentos de contratista persona natural
      description: |
        Permite actualizar los documentos asociados a un contratista persona natural ya registrado. Para realizar la actualización, se debe enviar el RUT del contratista y los nuevos documentos a cargar. La correspondencia entre los metadatos y los documentos adjuntos debe ser exacta.
      operationId: updateContractorNaturalPersonFilesDoc
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContractorNaturalPersonFilesUpdateMultipartRequest'
            examples:
              persona_natural_actualizacion:
                summary: Ejemplo de actualización de documentos persona natural
                value:
                  contractor:
                    rut: "22222222-2"
                  metadata:
                    - fileName: cedula_dummy.pdf
                      documentType: 30
                      documentEntity: 1
                      side: frontal
                    - fileName: licencia_dummy.pdf
                      documentType: 31
                      documentEntity: 1
                      side: frontal
                  files:
                    - cedula_dummy.pdf
                    - licencia_dummy.pdf
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                persona_natural_archivos:
                  summary: Ejemplo exitoso persona natural
                  value:
                    statusCode: 201
                    message: Documentos del contratista persona natural actualizados correctamente
        '400':
          description: "Payload inválido o incompleto (ejemplo: falta rut, metadata-files no coinciden, peso excesivo, etc)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                payload_invalido:
                  summary: Payload inválido o incompleto
                  value:
                    statusCode: 400
                    message: Payload inválido o incompleto
                    error: ValidationError
        '401':
          description: API key ausente o invalida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
              examples:
                no_autorizado:
                  summary: API key ausente o invalida
                  value:
                    message: Unauthorized
                    request_id: fd49b7506711ab474ebb396eb7d07c45
        '409':
          description: Conflicto por entidad ya existente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                conflicto_entidad:
                  summary: Entidad ya existente
                  value:
                    statusCode: 409
                    message: Conflicto por entidad ya existente
                    error: Conflict
  /request/staff:
    post:
      tags: [Gestion de Personal]
      summary: Crear personal
      description: |
        Registra personal asociado a un contratista mediante companyContractorId.

        Documentos de personal para carga (`metadata.documentType`):
        - 30 Cédula de identidad
        - 31 Licencia de conducir
        - 32 Certificado de antecedentes
        - 33 Hoja de vida del conductor

        Regla de obligatoriedad:
        - Depende del contrato (puede ser obligatorio o deseable).
        - Tipo 34 (Juicios penales o civiles) está en catálogo, pero no es de carga de archivo (`is_file=false`).
      operationId: createStaff
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StaffMultipartRequest'
            examples:
              staff_con_documentos:
                summary: Ejemplo de creación de personal con documentos
                value:
                  staff:
                    name: "Personal"
                    lastName: "Con Docs"
                    mothersLastName: "Completos"
                    rut: "21189592-6"
                    staffType: 2
                  companyContractorId: "11111111-2222-3333-4444-555555555555"
                  metadata:
                    - documentType: 30
                      documentEntity: 4
                      rut: "21189592-6"
                      side: frontal
                      fileName: CIF.png
                    - documentType: 32
                      documentEntity: 4
                      rut: "21189592-6"
                      fileName: CA.pdf
                  files:
                    - CIF.png
                    - CA.pdf
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '400':
          description: Payload invalido o incompleto.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                payload_invalido:
                  summary: Payload inválido o incompleto
                  value:
                    statusCode: 400
                    message: Payload inválido o incompleto
                    error: ValidationError
        '401':
          description: API key ausente o invalida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
              examples:
                no_autorizado:
                  summary: API key ausente o invalida
                  value:
                    message: Unauthorized
                    request_id: fd49b7506711ab474ebb396eb7d07c45
  /request/vehicle:
    post:
      tags: [Gestion de Vehiculos]
      summary: Crear vehiculo
      description: |
        Registra un vehiculo asociado a un contratista mediante companyContractorId.

        Documentos de vehículo/acoplado para carga (`metadata.documentType`):
        - 24 Permiso de circulación
        - 25 Revisión técnica
        - 26 SOAP
        - 28 Póliza del seguro
        - 29 Pagos del seguro

        Regla de obligatoriedad:
        - 24, 25 y 26 suelen ser obligatorios según contrato.
        - 28 y 29 pueden ser obligatorios o deseables según contrato.
        - Tipo 27 (Encargo por robo) está en catálogo, pero no es de carga de archivo (`is_file=false`).
      operationId: createVehicle
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VehicleMultipartRequest'
            examples:
              vehiculo_con_documentos:
                summary: Ejemplo de creación de vehículo con documentos
                value:
                  vehicle:
                    vehicleType: 2
                    patent: CFSF11
                  companyContractorId: "11111111-2222-3333-4444-555555555555"
                  metadata:
                    - documentType: 24
                      documentEntity: 3
                      patent: CFSF11
                      fileName: PC.pdf
                    - documentType: 25
                      documentEntity: 3
                      patent: CFSF11
                      fileName: RT.pdf
                    - documentType: 26
                      documentEntity: 3
                      patent: CFSF11
                      fileName: S.pdf
                  files:
                    - PC.pdf
                    - RT.pdf
                    - S.pdf
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '400':
          description: Payload invalido o incompleto.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                payload_invalido:
                  summary: Payload inválido o incompleto
                  value:
                    statusCode: 400
                    message: Payload inválido o incompleto
                    error: ValidationError
        '401':
          description: API key ausente o invalida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
              examples:
                no_autorizado:
                  summary: API key ausente o invalida
                  value:
                    message: Unauthorized
                    request_id: fd49b7506711ab474ebb396eb7d07c45
  /consultation/contractor/{rutContractor}:
    get:
      tags: [Consultas Entidades]
      summary: Consultar contratista
      description: Obtiene informacion de un contratista por su RUT.
      operationId: getContractorInformation
      servers:
        - url: "{base_url}/msinformation"
          variables:
            base_url:
              default: 'https://kong-proxy-np.testia.cl/dev/msvalidation'
          description: URL publica de consultas via Kong
      parameters:
        - name: rutContractor
          in: path
          required: true
          description: RUT del contratista.
          schema:
            type: string
            example: 99999999-9
      responses:
        '200':
          description: Datos obtenidos exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityConsultationResponse'
              examples:
                consulta_exitosa:
                  summary: Consulta exitosa
                  value:
                    rut: 99999999-9
                    name: Contratista Ejemplo
        '400':
          description: Solicitud incorrecta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                solicitud_incorrecta:
                  summary: Solicitud incorrecta
                  value:
                    statusCode: 400
                    message: Solicitud incorrecta
                    error: ValidationError
        '401':
          description: No autorizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                no_autorizado:
                  summary: No autorizado
                  value:
                    statusCode: 401
                    message: No autorizado
                    error: Unauthorized
  /consultation/vehicle/{patente}:
    get:
      tags: [Consultas Entidades]
      summary: Consultar vehiculo independiente
      description: Obtiene informacion de un vehiculo independiente por patente.
      operationId: getVehicleInformationIndependent
      servers:
        - url: "{base_url}/msinformation"
          variables:
            base_url:
              default: 'https://kong-proxy-np.testia.cl/dev/msvalidation'
          description: URL publica de consultas via Kong
      parameters:
        - name: patente
          in: path
          required: true
          description: Patente del vehiculo.
          schema:
            type: string
            example: XXXX00
      responses:
        '200':
          description: Datos obtenidos exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityConsultationResponse'
              examples:
                consulta_exitosa:
                  summary: Consulta exitosa
                  value:
                    patent: XXXX00
                    vehicleType: 2
        '400':
          description: Solicitud incorrecta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                solicitud_incorrecta:
                  summary: Solicitud incorrecta
                  value:
                    statusCode: 400
                    message: Solicitud incorrecta
                    error: ValidationError
        '401':
          description: No autorizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                no_autorizado:
                  summary: No autorizado
                  value:
                    statusCode: 401
                    message: No autorizado
                    error: Unauthorized
  /consultation/contractor/{rutContractor}/vehicle/{patente}:
    get:
      tags: [Consultas Entidades]
      summary: Consultar vehiculo asociado
      description: Obtiene informacion de un vehiculo asociado a un contratista.
      operationId: getVehicleInformationByContractor
      servers:
        - url: "{base_url}/msinformation"
          variables:
            base_url:
              default: 'https://kong-proxy-np.testia.cl/dev/msvalidation'
          description: URL publica de consultas via Kong
      parameters:
        - name: rutContractor
          in: path
          required: true
          description: RUT del contratista asociado.
          schema:
            type: string
            example: 99999999-9
        - name: patente
          in: path
          required: true
          description: Patente del vehiculo.
          schema:
            type: string
            example: XXXX00
      responses:
        '200':
          description: Datos obtenidos exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityConsultationResponse'
              examples:
                consulta_exitosa:
                  summary: Consulta exitosa
