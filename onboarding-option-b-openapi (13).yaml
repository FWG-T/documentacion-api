            - fileName: licencia_dummy.pdf
              documentType: 31
              documentEntity: 1
              side: frontal
        files:
          type: array
          items:
            type: string
            format: binary
          description: Los nombres y cantidad de los archivos debe coincidir con la metadata.
      required: [contractor, metadata, files]
    ContractorNaturalPersonMultipartRequest:
      type: object
      properties:
        contractor:
          type: object
          description: |
            Datos del contratista. Para actualizar, enviar unicamente el campo rut (Solo se permite actualizar documentos).
            Debe usarse contractorTypeId=2 para contratista persona natural.
          properties:
            contractorTypeId:
              type: number
              description: ID del tipo de contratista. Para este flujo debe ser "2" (Persona natural).
            rut:
              type: string
              description: RUT del contratista para crear o actualizar en formato con guiones sin puntos.
            name:
              type: string
              description: Nombre del contratista persona natural.
            lastName:
              type: string
              description: Apellido paterno del contratista persona natural.
            mothersLastName:
              type: string
              description: Apellido materno del contratista persona natural.
            serviceTypeId:
              type: number
              description: |
                ID del tipo de servicio del contratista.
                - Tipo "1" para Monitoreo: Revisión periódica.
                - Tipo "2" para Prospecto: Revisión única.
            reviewStartDate:
              type: string
              format: date-time
              description: Fecha de inicio de la review en formato ISO 8601.
            reviewEndDate:
              type: string
              format: date-time
              description: Fecha de fin de la review en formato ISO 8601.
            reviewCompaniesId:
              type: array
              items:
                type: integer
              description: IDs de empresas de revisión asociadas. Enviar arreglo vacío si no aplica.
          required:
            - contractorTypeId
            - rut
            - serviceTypeId
            - reviewStartDate
            - reviewEndDate
          example:
            contractorTypeId: 2
            rut: "22222222-2"
            name: Nombre Dummy
            lastName: Apellido
            mothersLastName: Demo
            serviceTypeId: 1
            reviewStartDate: "2025-01-13T02:59:00.000Z"
            reviewEndDate: "2027-01-13T02:59:00.000Z"
            reviewCompaniesId: []
        contractorPartner:
          type: object
          description: Datos de la contraparte asociada al contratista.
          properties:
            rut:
              type: string
              description: RUT de la contraparte asociado al contratista. Formato con guiones sin puntos.
            name:
              type: string
              description: Nombre de la contraparte asociado al contratista.
            lastName:
              type: string
              description: Apellido de la contraparte asociado al contratista. Se requieren ambos apellidos.
            email:
              type: string
              description: Correo de la contraparte asociado al contratista.
            phoneNumber:
              type: string
              description: Telefono de la contraparte asociado al contratista.
          required:
            - rut
            - name
            - lastName
            - email
            - phoneNumber
          example:
            rut: "22222222-2"
            name: Nombre
            lastName: Dummy Demo
            email: dummy.np@testia.cl
            phoneNumber: "+56911111111"
        metadata:
          description: Metadatos relacionados con los documentos del contratista.
          type: array
          items:
            type: object
            properties:
              fileName:
                type: string
                description: Nombre del documento a subir.
              side:
                type: string
                description: Side puede ser "frontal" o "trasera". Solo para carnet de identidad y licencia de conducir cuando sea de tipo contratista "2" (Persona natural).
              documentType:
                type: number
                description: |
                  Identificador del tipo de documento a cargar.
                  - Para persona natural:
                    - "30" Cedula de Identidad
                    - "31" Licencia de conducir
                    - "32" Certificado de Antecedentes
                    - "33" Hoja de vida del conductor
                  Regla de obligatoriedad:
                    - Depende del contrato: puede ser obligatorio o deseable.
              documentEntity:
                type: number
                description: |
                  Identificador del tipo de documento a cargar.
                  - Para persona natural:
                    - "1" Contratista.
            required:
              - fileName
              - documentType
          example:
            - fileName: cedula_dummy_frontal.jpeg
              documentType: 30
              side: frontal
            - fileName: cedula_dummy_trasera.jpeg
              documentType: 30
              side: trasera
            - fileName: licencia_dummy_frontal.jpeg
              documentType: 31
              side: frontal
            - fileName: licencia_dummy_trasera.jpeg
              documentType: 31
              side: trasera
        files:
          type: array
          items:
            type: string
            format: binary
          description: Los nombres y cantidad de los archivos debe coincidir con la metadata.
      required: [contractor, contractorPartner]
    StaffMultipartRequest:
      type: object
      properties:
        staff:
          type: object
          description: Datos del personal. Para actualizar, enviar unicamente el campo rut (Solo se permite actualizar documentos).
          properties:
            name:
              type: string
              description: Nombre del personal.
            lastName:
              type: string
              description: Apellido paterno del personal.
            mothersLastName:
              type: string
              description: Apellido materno del personal.
            rut:
              type: string
              description: RUT del personal en formato con guiones sin puntos.
            staffType:
              type: number
              description: Identificador del tipo de personal.
          required:
            - name
            - lastName
            - mothersLastName
            - rut
            - staffType
          example:
            name: Nombre
            lastName: Dummy
            mothersLastName: González
            rut: "11111111-1"
            staffType: 1
        companyContractorId:
          type: string
          format: uuid
          description: Identificador del contratista empresa al que se asocia el personal.
          example: 11111111-2222-3333-4444-555555555555
        metadata:
          type: array
          description: Metadatos relacionados con los documentos del personal.
          items:
            type: object
            properties:
              fileName:
                type: string
                description: Nombre del documento a subir.
              documentType:
                type: number
                description: |
                  Identificador del tipo de documento a cargar para personal.
                  - "30" Cedula de Identidad
                  - "31" Licencia de conducir
                  - "32" Certificado de Antecedentes
                  - "33" Hoja de vida del conductor
                  Regla de obligatoriedad:
                  - Depende del contrato: puede ser obligatorio o deseable.
                  - "34" Juicios penales o civiles existe en catálogo, pero no es de carga (`is_file=false`).
              documentEntity:
                type: number
                description: |
                  Identificador de entidad para documentos de personal.
                  - "4" Personal
              rut:
                type: string
                description: RUT del personal al que pertenece el documento.
              side:
                type: string
                description: Side puede ser "frontal" o "trasera" para documentos que tienen ambas caras.
            required:
              - fileName
              - documentType
              - documentEntity
              - rut
          example:
            - fileName: CIF.png
              documentType: 30
              documentEntity: 4
              rut: "21189592-6"
              side: frontal
            - fileName: CA.pdf
              documentType: 32
              documentEntity: 4
              rut: "21189592-6"
        files:
          type: array
          items:
            type: string
            format: binary
          description: Los nombres y cantidad de los archivos debe coincidir con la metadata.
      required: [staff, companyContractorId]
    VehicleMultipartRequest:
      type: object
      properties:
        vehicle:
          type: object
          description: Datos del vehiculo a crear o actualizar.
          properties:
            vehicleType:
              type: number
              description: Identificador del tipo de vehiculo.
            patent:
              type: string
              description: Patente del vehiculo.
          required:
            - vehicleType
            - patent
          example:
            vehicleType: 1
            patent: BDZW17
        coupled:
          type: object
          description: Datos opcionales de acoplado a crear junto al vehiculo.
          properties:
            coupledType:
              type: number
              description: Identificador del tipo de acoplado.
            patent:
              type: string
              description: Patente del acoplado.
          required:
            - coupledType
            - patent
          example:
            coupledType: 1
            patent: GSFZ70
        companyContractorId:
          type: string
          format: uuid
          description: Identificador del contratista empresa al que se asocia el vehiculo.
          example: 11111111-2222-3333-4444-555555555555
        metadata:
          type: array
          description: Metadatos relacionados con los documentos del vehiculo o acoplado.
          items:
            type: object
            properties:
              fileName:
                type: string
                description: Nombre del documento a subir.
              documentType:
                type: number
                description: |
                  Identificador del tipo de documento a cargar.
                  - "24" Permiso de circulación
                  - "25" Revisión técnica
                  - "26" SOAP
                  - "28" Póliza del seguro
                  - "29" Pagos del seguro
                  Regla de obligatoriedad:
                  - 24, 25 y 26 suelen ser obligatorios según contrato.
                  - 28 y 29 pueden ser obligatorios o deseables según contrato.
                  - "27" Encargo por robo existe en catálogo, pero no es de carga (`is_file=false`).
              documentEntity:
                type: number
                description: |
                  Identificador de entidad del documento.
                  - "3" Vehículo
                  - "5" Acoplado
              patent:
                type: string
                description: Patente del vehiculo o acoplado asociado al documento.
              period:
                type: string
                description: Periodo MM/YYYY para documentos periódicos (ejemplo, documentType 29).
            required:
              - fileName
              - documentType
              - documentEntity
              - patent
          example:
            - fileName: PC.jpeg
              documentType: 24
              documentEntity: 3
              patent: HPXJ23
            - fileName: pagos_marzo_2026.pdf
              documentType: 29
              documentEntity: 3
              patent: HPXJ23
              period: 03/2026
        files:
          type: array
          items:
            type: string
            format: binary
          description: Los nombres y cantidad de los archivos debe coincidir con la metadata.
      required: [vehicle, companyContractorId]





