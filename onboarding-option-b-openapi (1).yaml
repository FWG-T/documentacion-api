  /api/v1/groups/vehicle/unassign:
    post:
      tags: [Grupos y Etiquetas Desasignacion]
      summary: Desasignar contratista de un vehiculo
      description: |
        Desasigna un contratista por RUT de un vehiculo por su patente.
      operationId: unassignContractorToVehicle
      servers:
        - url: https://kong-proxy-np.testia.cl/dev/msgroups
          description: Ambiente DEV msgroups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleContractorAssociationRequest'
      responses:
        '201':
          description: Datos obtenidos exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupAssociationSuccessResponse'
        '400':
          description: Solicitud incorrecta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Contratista no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/groups/vehicle/{vehiclePlate}/contractors:
    get:
      tags: [Grupos y Etiquetas Consultas]
      summary: Obtener contratistas asociados a un vehiculo
      description: Obtiene listado de contratistas (nombre y RUT) asociados a un vehiculo.
      operationId: getContractorsByVehicle
      servers:
        - url: https://kong-proxy-np.testia.cl/dev/msgroups
          description: Ambiente DEV msgroups
      parameters:
        - name: vehiclePlate
          in: path
          required: true
          description: Patente del vehiculo.
          schema:
            type: string
            example: ABCD12
      responses:
        '201':
          description: Datos obtenidos exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContractorAssociationListItem'
        '400':
          description: Solicitud incorrecta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autorizado.
