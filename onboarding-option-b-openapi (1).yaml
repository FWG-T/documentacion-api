              description: Identificador del tipo de vehiculo.
            patent:
              type: string
              description: Patente del vehiculo.
          required:
            - vehicleType
            - patent
          example:
            vehicleType: 1
            patent: BDZW17
        coupled:
          type: object
          description: Datos opcionales de acoplado a crear junto al vehiculo.
          properties:
            coupledType:
              type: number
              description: Identificador del tipo de acoplado.
            patent:
              type: string
              description: Patente del acoplado.
          required:
            - coupledType
            - patent
          example:
            coupledType: 1
            patent: GSFZ70
        companyContractorId:
          type: string
          format: uuid
          description: Identificador del contratista empresa al que se asocia el vehiculo.
          example: 11111111-2222-3333-4444-555555555555
        metadata:
          type: array
          description: Metadatos relacionados con los documentos del vehiculo o acoplado.
          items:
            type: object
            properties:
              fileName:
                type: string
                description: Nombre del documento a subir.
              documentType:
                type: number
                description: |
                  Identificador del tipo de documento a cargar.
                  - "24" Permiso de circulación
                  - "25" Revisión técnica
                  - "26" SOAP
                  - "29" Pagos del seguro
              documentEntity:
                type: number
                description: |
                  Identificador de entidad del documento.
                  - "3" Vehículo
              patent:
                type: string
                description: Patente del vehiculo o acoplado asociado al documento.
              period:
                type: string
                description: Periodo MM/YYYY para documentos periódicos (ejemplo, documentType 29).
            required:
              - fileName
              - documentType
              - documentEntity
              - patent
