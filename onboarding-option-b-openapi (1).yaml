            - fileName: pagos_marzo_2026.pdf
              documentType: 29
              documentEntity: 3
              patent: HPXJ23
              period: 03/2026
        files:
          type: array
          items:
            type: string
            format: binary
          description: Los nombres y cantidad de los archivos debe coincidir con la metadata.
      required: [vehicle, companyContractorId]
