components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: apikey
  schemas:
    WebhookEventOutput:
      type: object
      properties:
        action:
          type: string
          example: staff.create
        status:
          type: string
          example: success
        operationType:
          type: string
          example: create
        entity:
          type: string
          example: staff
        description:
          type: string
          example: creacion de personal
        timestamp:
          type: string
          format: date-time
          example: '2026-05-14T10:00:00.000Z'
        payload:
          type: object
          description: Datos asociados al evento.
          additionalProperties: true
      required: [action, status, operationType, entity, description, timestamp, payload]
    AcceptedResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 201
        message:
          type: string
          example: Solicitud recibida y procesando
      required: [statusCode, message]
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Bad Request
        error:
          type: string
          example: ValidationError
      required: [statusCode, message]
    ContractorAssociationListItem:
      type: object
      properties:
        rut:
          type: string
          example: 76192268-8
        name:
          type: string
          example: orbis data spa
      required: [rut, name]
    VehicleContractorAssociationRequest:
      type: object
      properties:
        contractorRut:
          type: string
          description: RUT del contratista.
          example: 77655802-8
        patent:
          type: string
          description: Patente del vehiculo.
          example: KTGT79
      required: [contractorRut, patent]
    StaffContractorAssociationRequest:
      type: object
      properties:
        contractorRut:
          type: string
          description: RUT del contratista.
          example: 77655802-8
        staffRut:
          type: string
          description: RUT del personal.
          example: 24424242-2
      required: [contractorRut, staffRut]
    GroupAssociationSuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: Vehiculo asignado correctamente
        success:
          type: boolean
          example: true
      required: [message, success]
    ContractorCompanyMultipartRequest:
      type: object
      properties:
        contractor:
          type: object
          description: |
            Datos del contratista. Para actualizar, enviar unicamente el campo rut (Solo se permite actualizar documentos).
            Debe usarse contractorTypeId=1 para empresa y contractorTypeId=2 para persona natural.
          properties:
            contractorTypeId:
              type: number
              description: ID del tipo de contratista. Tipo "1" para Empresa o "2" para Persona natural.
            rut:
              type: string
              description: RUT del contratista para crear o actualizar en formato con guiones sin puntos.
            businessName:
              type: string
              description: Nombre de la contratista. Obligatorio cuando sea tipo "1" (Empresa).
            name:
              type: string
              description: Nombre del contratista. Obligatorio cuando `contractorTypeId` sea "2" (Persona natural).
            lastName:
              type: string
              description: Apellido paterno del contratista. Obligatorio cuando `contractorTypeId` sea "2" (Persona natural).
            mothersLastName:
              type: string
              description: Apellido materno del contratista. Obligatorio cuando `contractorTypeId` sea "2" (Persona natural).
            serviceTypeId:
              type: number
              description: |
                ID del tipo de servicio del contratista.
                - Tipo "1" para Monitoreo: Clientes finales.
                - Tipo "2" para Prospecto: Clientes potenciales (Con tiempo y funciones limitadas).
            reviewStartDate:
              type: string
              format: date-time
              description: Fecha de inicio de la review en formato ISO 8601.
            reviewEndDate:
              type: string
              format: date-time
              description: Fecha de fin de la review en formato ISO 8601.
            reviewCompaniesId:
              type: array
              items:
                type: number
              description: Lista de empresas de revisión asociadas al contratista.
          required:
            - contractorTypeId
            - rut
            - serviceTypeId
            - reviewStartDate
            - reviewEndDate
            - reviewCompaniesId
          example:
            contractorTypeId: 1
            rut: "77836508-1"
            businessName: Testia SpA
            serviceTypeId: 1
            reviewStartDate: "2025-01-13T02:59:00.000Z"
            reviewEndDate: "2027-01-13T02:59:00.000Z"
            reviewCompaniesId: []
        contractorPartner:
          type: object
          description: Datos de la contraparte asociada al contratista.
          properties:
            rut:
              type: string
              description: RUT de la contraparte asociado al contratista. Formato con guiones sin puntos.
            name:
              type: string
              description: Nombre de la contraparte asociado al contratista.
            lastName:
              type: string
              description: Apellido de la contraparte asociado al contratista. Se requieren ambos apellidos.
            email:
              type: string
              description: Correo de la contraparte asociado al contratista.
            phoneNumber:
              type: string
              description: Telefono de la contraparte asociado al contratista.
          required:
            - rut
            - name
            - lastName
            - email
            - phoneNumber
          example:
            rut: "14260894-4"
            name: Juan
            lastName: Pérez Silva
            email: juan.perez@testia.cl
            phoneNumber: "+56987654321"
        metadata:
          description: Metadatos relacionados con los documentos del contratista.
          type: array
          items:
            type: object
            properties:
              fileName:
                type: string
                description: Nombre del documento a subir.
              documentType:
                type: number
                description: |
                  Identificador del tipo de documento a cargar.
                  - Para empresa:
                    - "16" F30 (Total pagos)
                    - "17" F30 - 1 (Pagos individuales)
                    - "18" Carpeta Tributaria.
              documentEntity:
                type: number
                description: |
                  Identificador del tipo de documento a cargar.
                  - Para empresa:
                    - "1" Contratista.
            required:
              - fileName
              - documentType
              - documentEntity
          example:
            - fileName: F30_orbis.pdf
              documentType: 16
              documentEntity: 1
            - fileName: F30-1_orbis.pdf
              documentType: 17
              documentEntity: 1
            - fileName: carpeta_tributaria_orbis.pdf
              documentType: 18
              documentEntity: 1
        files:
          type: array
          items:
            type: string
            format: binary
          description: Los nombres y cantidad de los archivos debe coincidir con la metadata.
      required: [contractor, contractorPartner]
