            lastName:
              type: string
              description: Apellido paterno del personal.
            mothersLastName:
              type: string
              description: Apellido materno del personal.
            rut:
              type: string
              description: RUT del personal en formato con guiones sin puntos.
            staffType:
              type: number
              description: Identificador del tipo de personal.
          required:
            - name
            - lastName
            - mothersLastName
            - rut
            - staffType
          example:
            name: Juan
            lastName: Pérez
            mothersLastName: González
            rut: "11111111-1"
            staffType: 1
        companyContractorId:
          type: string
          format: uuid
          description: Identificador del contratista empresa al que se asocia el personal.
          example: 11111111-2222-3333-4444-555555555555
        metadata:
          type: array
          description: Metadatos relacionados con los documentos del personal.
          items:
            type: object
            properties:
              fileName:
                type: string
                description: Nombre del documento a subir.
              documentType:
                type: number
                description: |
                  Identificador del tipo de documento a cargar para personal.
                  - "30" Cedula de Identidad
                  - "31" Licencia de conducir
                  - "32" Certificado de Antecedentes
                  - "33" Hoja de vida del conductor
              documentEntity:
                type: number
                description: |
                  Identificador de entidad para documentos de personal.
                  - "4" Personal
              rut:
                type: string
                description: RUT del personal al que pertenece el documento.
              side:
                type: string
                description: Side puede ser "frontal" o "trasera" para documentos que tienen ambas caras.
            required:
              - fileName
              - documentType
              - documentEntity
              - rut
