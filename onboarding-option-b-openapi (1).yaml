openapi: 3.0.3
info:
  title: Testia Onboarding API - Flujo Guiado
  version: 1.1.0
  license:
    name: Proprietary
    url: https://www.testia.cl
  description: |
    API para la creación de contratistas, vehículos y personal y actualización de sus documentos. Asimismo, permite la eliminación, desactivación y activación de contratistas, vehículos y personal.
  x-last-updated: 2026-05-15
servers:
  - url: https://{urlbase}
    description: URL base pública para consumo cliente
    variables:
      urlbase:
        default: api.testia.com
        description: Dominio base de la API
security:
  - ApiKeyAuth: []
tags:
  - name: Acceso y Autenticacion
    description: Requisitos de acceso tecnico y uso de credenciales.
  - name: Contratista Empresa
    description: Registro de contratista empresa.
  - name: Contratista Persona Natural
    description: Registro de contratista persona natural.
  - name: Gestion de Personal
    description: Registro de personal asociado a contratista.
  - name: Gestion de Vehiculos
    description: Registro de vehiculos asociados a contratista.
  - name: Grupos y Etiquetas Consultas
    description: Consultas de contratistas asociados a entidades en ms-groups.
  - name: Grupos y Etiquetas Asignacion
    description: Asociacion de contratistas a vehiculos o personal en ms-groups.
  - name: Grupos y Etiquetas Desasignacion
    description: Desasociacion de contratistas a vehiculos o personal en ms-groups.
  - name: Configuracion Webhook
    description: Guia de configuracion y eventos del webhook de notificaciones de Testia.
paths:
  /request/contractor:
    post:
      tags: [Contratista Empresa]
      summary: Crear o actualizar contratista
      description: |
        ### Crear contratista empresa
        Registra los datos del contratista y su contraparte, junto con los documentos iniciales.

        ### Crear o actualizar contratista - Archivos
        Para un contratista ya existente, la actualizacion se realiza mediante nueva carga de documentos,
        identificando al contratista por `contractor.rut`.

        Reglas de subida de archivos (aplica tanto para creacion como para actualizacion de documentos):
        - Enviar los binarios en `files`.
        - Enviar el detalle de cada archivo en `metadata`.
        - Cada `metadata.fileName` debe coincidir con un archivo adjunto en `files`
          (mismo nombre y misma cantidad), de lo contrario la solicitud sera rechazada.
      operationId: createContractor
      servers:
        - url: https://{urlbase}
          description: URL pública para consumo cliente
          variables:
            urlbase:
              default: api.testia.com
              description: Dominio base de la API
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContractorCompanyMultipartRequest'
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                empresa:
                  summary: Ejemplo exitoso empresa
                  value:
                    statusCode: 201
                    message: Contratista empresa creado correctamente
                persona_natural:
                  summary: Ejemplo exitoso persona natural
                  value:
                    statusCode: 201
                    message: Contratista persona natural creado correctamente
        '400':
          description: "Payload inválido o incompleto (ejemplo: falta rut, businessName, contractorPartner, peso excesivo, etc)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sin_rut:
                  summary: Falta campo rut
                  value:
                    statusCode: 400
                    message: Campo rut es obligatorio
                    error: ValidationError
                sin_businessName:
                  summary: Falta campo businessName
                  value:
                    statusCode: 400
                    message: Campo businessName es obligatorio
                    error: ValidationError
                sin_contractorPartner:
                  summary: Falta campo contractorPartner
                  value:
                    statusCode: 400
                    message: Campo contractorPartner es obligatorio
                    error: ValidationError
                peso_excesivo:
                  summary: Archivo adjunto excede el tamaño permitido
                  value:
                    statusCode: 400
                    message: Tamaño máximo de archivo excedido
                    error: PayloadTooLarge
        '401':
          description: API key ausente o invalida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflicto por entidad ya existente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /request/contractor/files:
    post:
      tags: [Contratista Empresa]
      summary: Crear o actualizar contratista (archivos)
      description: |
        Este endpoint documental explica cómo actualizar documentos de un contratista ya existente.
        
        **¿Cuándo usarlo?**
        Cuando necesite subir nuevos archivos/documentos para un contratista que ya está registrado en el sistema.
        
        **¿Cómo hacerlo?**
        1. Envíe el campo `contractor.rut` con el RUT del contratista existente.
        2. Envíe los archivos nuevos en el campo `files`.
        3. Envíe el detalle de cada archivo en el campo `metadata`.
        4. Cada `metadata.fileName` debe coincidir exactamente con un archivo adjunto en `files` (nombre y cantidad).
        
        Si la correspondencia entre metadata y archivos no es exacta, la solicitud será rechazada.
        
        > Este endpoint es una ayuda documental: la actualización real de archivos se realiza usando el endpoint principal `/request/contractor`.
      operationId: updateContractorFilesDoc
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContractorCompanyMultipartRequest'
      responses:
        '200':
          description: Documentación de ayuda para actualización de archivos.
        '400':
          description: Solicitud incorrecta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /request/contractor/natural-person:
    post:
      tags: [Contratista Persona Natural]
      summary: Crear contratista persona natural
      description: |
        Registra un contratista persona natural.
        Requiere contractor y contractorPartner; no utiliza companyContractorId.
      operationId: createNaturalPersonContractor
      servers:
        - url: https://{urlbase}
          description: URL pública para consumo cliente
          variables:
            urlbase:
              default: api.testia.com
              description: Dominio base de la API
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContractorNaturalPersonMultipartRequest'
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                persona_natural:
                  summary: Ejemplo exitoso persona natural
                  value:
                    statusCode: 201
                    message: Contratista persona natural creado correctamente
        '400':
          description: "Payload inválido o incompleto (ejemplo: falta rut, peso excesivo, etc)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sin_rut:
                  summary: Falta campo rut
                  value:
                    statusCode: 400
                    message: Campo rut es obligatorio
                    error: ValidationError
                peso_excesivo:
                  summary: Archivo adjunto excede el tamaño permitido
                  value:
                    statusCode: 400
                    message: Tamaño máximo de archivo excedido
                    error: PayloadTooLarge
        '401':
          description: API key ausente o inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /request/staff:
