                          pero no es de carga (`is_file=false`).
                      documentEntity:
                        type: number
                        description: |
                          Identificador de entidad para documentos de personal.
                          - "4" Personal
                      rut:
                        type: string
                        description: RUT del personal al que pertenece el documento.
                      side:
                        type: string
                        description: >-
