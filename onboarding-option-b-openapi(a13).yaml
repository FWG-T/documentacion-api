                  - 24, 25 y 26 suelen ser obligatorios según contrato.

                  - 28 y 29 pueden ser obligatorios o deseables según contrato.

                  - "27" Encargo por robo existe en catálogo, pero no es de
                  carga (`is_file=false`).
              documentEntity:
                type: number
                description: |
                  Identificador de entidad del documento.
                  - "3" Vehículo
                  - "5" Acoplado
              patent:
                type: string
                description: Patente del vehículo o acoplado asociado al documento.
              period:
                type: string
                description: >-
                  Periodo MM/YYYY para documentos periódicos (ejemplo,
                  documentType 29).
            required:
              - fileName
              - documentType
              - documentEntity
              - patent
          example:
            - fileName: PC.jpeg
              documentType: 24
              documentEntity: 3
              patent: BDZW17
            - fileName: pagos_marzo_2026.pdf
              documentType: 29
              documentEntity: 3
              patent: BDZW17
              period: 03/2026
        files:
          type: array
          items:
            type: string
            format: binary
          description: >-
            Los nombres y cantidad de los archivos deben coincidir con la
            metadata.
      required:
        - vehicle
  responses: {}
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: apikey
servers:
  - url: url_testia
    description: url_testia
security: []
