  /request/staff:
    post:
      summary: Crear personal
      deprecated: false
      description: >
        Registra personal usando el flujo sin contratista asociado.


        Documentos de personal para carga (`metadata.documentType`):

        - 30 Cédula de identidad

        - 31 Licencia de conducir

        - 32 Certificado de antecedentes

        - 33 Hoja de vida del conductor


        Regla de obligatoriedad:

        - Depende del contrato (puede ser obligatorio o deseable).

        - Tipo 34 (Juicios penales o civiles) está en catálogo, pero no es de
        carga de archivo (`is_file=false`).
      operationId: upsertIndependentStaff
      tags:
        - Gestión de personal
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                staff:
                  type: object
                  description: Datos del personal a crear.
                  properties:
                    name:
                      type: string
                      description: Nombre del personal.
                    lastName:
                      type: string
                      description: Apellido paterno del personal.
                    mothersLastName:
                      type: string
                      description: Apellido materno del personal.
                    rut:
                      type: string
                      description: RUT del personal en formato con guiones sin puntos.
                    staffType:
                      type: number
                      description: |
                        Tipo de personal:
                        - `1` Chofer
                        - `2` Peoneta
                        - `3` Gruero
                        - `4` Encargado bodega
                        - `5` Administrativo
                        - `6` Otro
                  required:
                    - name
                    - lastName
                    - mothersLastName
                    - rut
                    - staffType
                  example:
                    name: Nombre
                    lastName: Dummy
                    mothersLastName: González
                    rut: 11111111-1
                    staffType: 1
                metadata:
                  type: array
                  description: Metadatos relacionados con los documentos del personal.
                  items:
                    type: object
                    properties:
                      fileName:
                        type: string
                        description: Nombre del documento a subir.
