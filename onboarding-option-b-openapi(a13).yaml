openapi: 3.0.1
info:
  title: Testia Onboarding API - Flujo Guiado
  description: >
    API para la creación, activación y desactivación de contratistas, vehículos
    y personal, incluyendo la actualización de sus documentos de manera
    centralizada.
  version: 1.2.0
  license:
    name: Proprietary
    url: https://www.testia.cl
  x-last-updated: '2026-05-15T00:00:00.000Z'
tags:
  - name: Gestión de contratista empresa
  - name: Gestión de contratista persona natural
  - name: Gestión de personal
  - name: Gestión de vehículos
  - name: Gestión de relación
  - name: Configuración de Webhook
paths:
  /request/contractor:
    post:
      summary: Actualizar documentos de Contratista Empresa
      deprecated: false
      description: >-
        Permite actualizar los documentos de un Contratista Empresa previamente
        registrado. Se debe enviar el RUT del contratista, la metadata de los
        documentos y los archivos asociados. Los nombres y la cantidad de
        archivos deben coincidir con la metadata enviada.
      operationId: updateContractorFilesDoc
      tags:
        - Gestión de contratista empresa
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                contractor:
                  type: object
                  properties:
                    rut:
                      type: string
                      description: >-
                        RUT del Contratista Empresa en formato con guion y sin
                        puntos.
                  description: >-
                    Datos mínimos requeridos para identificar al Contratista
                    Empresa.
                  required:
                    - rut
                  example:
                    rut: 76000000-0
                metadata:
                  description: >-
                    Metadatos asociados a los documentos del Contratista
                    Empresa.
                  type: array
                  items:
                    type: object
                    properties:
                      fileName:
                        type: string
                        description: >-
                          Nombre del archivo a cargar. Debe coincidir con el
                          nombre enviado en files.
                      documentType:
                        type: number
                        description: >-
                          ID del tipo de documento asociado al Contratista
                          Empresa.


                          - 16: F30 (total pagos).

                          - 17: F30-1 (pagos individuales).

                          - 18: Carpeta Tributaria.


                          La obligatoriedad de cada documento depende de la
                          configuración contractual.
                      documentEntity:
                        type: number
                        description: |-
                          ID de la entidad asociada al documento.

                          - Para Contratista Empresa: 1.
                    required:
                      - fileName
                      - documentType
                      - documentEntity
                  example:
                    - fileName: F30_dummy.pdf
                      documentType: 16
                      documentEntity: 1
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: >-
                    Archivos asociados a la metadata enviada. Los nombres y la
                    cantidad de archivos deben coincidir con la metadata.
                  example:
                    - F30_dummy.pdf
              required:
                - contractor
                - metadata
                - files
            examples: {}
        required: true
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: >-
                      Solicitud de actualización de documentos recibida y en
                      procesamiento.
                    example: >-
                      Solicitud de actualizacion de contratista recibida y
                      procesando...
                required:
                  - message
              examples:
                archivos_actualizados:
                  summary: Solicitud de actualización recibida
                  value:
                    message: >-
                      Solicitud de actualizacion de contratista recibida y
                      procesando...
          headers: {}
        '400':
          description: Solicitud inválida.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: Código HTTP del error.
                    example: 400
                  message:
                    type: string
                    description: Detalle del error detectado en la solicitud.
                    example: El RUT del contratista no valido
                  errorType:
                    type: string
                    description: Tipo interno del error.
                    example: Bad Request
                  timestamp:
                    type: string
                    description: Fecha y hora en que ocurrió el error, en formato ISO 8601.
                    format: date-time
                    example: '2026-06-16T20:13:37.450Z'
                  path:
                    type: string
                    description: Ruta del endpoint que generó el error.
                    example: /request/contractor
                required:
                  - statusCode
                  - message
                  - errorType
                  - timestamp
                  - path
              examples:
                '3':
                  summary: RUT del Contratista Empresa no válido.
                  value:
                    statusCode: 400
                    timestamp: '2026-06-16T20:13:37.450Z'
                    path: /request/contractor
                    message: El RUT del contratista no valido
                    errorType: Bad Request
                '4':
                  summary: Contratista Empresa no registrado
                  value:
                    statusCode: 400
                    timestamp: '2026-06-16T20:15:22.456Z'
                    path: /request/contractor
                    message: >-
                      Las propiedades contractor y contractorPartner son
                      requeridas al crear
                    errorType: Bad Request
                '5':
                  summary: Cantidad de archivos y metadatos no coincide
                  value:
                    statusCode: 400
                    timestamp: '2026-06-16T20:17:02.157Z'
                    path: /request/contractor
                    message: La cantidad de archivos debe ser igual que metadatos
                    errorType: Bad Request
                '6':
                  summary: Nombre de archivo no coincide con la metadata
                  value:
                    statusCode: 400
                    timestamp: '2026-06-16T20:17:49.368Z'
                    path: /request/contractor
                    message: >-
                      El archivo CT.pdf en los metadatos no coincide con el
                      archivo enviado o no se encuentra.
                    errorType: Bad Request
                '7':
                  summary: Archivo excede el tamaño máximo permitido
                  value:
                    statusCode: 400
                    timestamp: '2026-06-16T20:20:09.450Z'
                    path: /request/contractor
                    message: Tamaño de archivo demasiado grande
                    errorType: Bad Request
                header_companyid_requerido:
                  summary: Propiedad rut del Contratista Empresa ausente o vacía
                  value:
                    statusCode: 400
                    timestamp: '2026-06-16T20:13:02.618Z'
                    path: /request/contractor
                    message: Verificar propiedad rut de contractor
                    errorType: Bad Request
          headers: {}
        '401':
          description: API key ausente o inválida.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Mensaje que indica el motivo del error de autenticación.
                    example: Unauthorized
                  request_id:
                    type: string
                    description: Identificador único de la solicitud.
                    example: fd49b7506711ab474ebb396eb7d07c45
                required:
                  - message
                  - request_id
              examples:
                '9':
                  summary: API key inválida
                  value:
                    message: Unauthorized
                    request_id: cbc5e948470e935e67f5130f9ac2c367
                no_autorizado:
                  summary: API key ausente
                  value:
                    message: No API key found in request
                    request_id: 2d1f231d4edb4449235ca43da6562232
          headers: {}
        '403':
          description: Empresa o contrato sin habilitación para uso de API.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: Código de estado HTTP.
                    example: 403
                  message:
                    type: string
                    description: Mensaje descriptivo del error.
                  errorType:
                    type: string
                    description: Código interno del error.
                    example: c001
                  timestamp:
                    type: string
                    format: date-time
                    description: Fecha y hora en que ocurrió el error (ISO 8601).
                  path:
                    type: string
                    description: Ruta del endpoint que generó el error.
                    example: /request/contractor
                required:
                  - statusCode
                  - message
                  - errorType
                  - timestamp
                  - path
              examples:
                '11':
                  summary: Contrato no vigente
                  value:
                    statusCode: 403
                    timestamp: '2026-06-16T16:58:24.975Z'
                    path: /request/contractor
                    message: Contrato no vigente
                    errorType: c001
                '12':
                  summary: Uso de API no habilitado
                  value:
                    statusCode: 403
                    timestamp: '2026-06-16T17:08:43.853Z'
                    path: /request/contractor
                    message: Empresa no tiene activa el uso de la API
                    errorType: c003
                empresa_no_encontrada:
                  summary: Empresa no habilitada
                  value:
                    statusCode: 403
                    timestamp: '2026-06-16T16:56:15.220Z'
                    path: /request/contractor
                    message: Empresa no habilitada
                    errorType: c001
          headers: {}
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: Código de estado HTTP.
                    example: 500
                  message:
                    type: string
                    description: Mensaje descriptivo del error.
                    example: Error interno, intente nuevamente
                  error:
                    type: string
                    description: Descripción estándar del error HTTP.
                    example: Internal Server Error
                required:
                  - statusCode
                  - message
                  - error
              examples:
                error_interno:
                  summary: Error interno del servidor
                  value:
                    statusCode: 500
                    message: Error interno, intente nuevamente
                    error: Internal Server Error
          headers: {}
      security:
        - ApiKeyAuth: []
