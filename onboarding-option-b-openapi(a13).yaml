  /request/contractor@natural-person:
    post:
      summary: Crear contratista persona natural
      deprecated: false
      description: >
        Permite registrar un contratista persona natural, incluyendo sus datos
        principales, representante y documentos requeridos según contrato.

        La obligatoriedad y el tipo de documentos dependen de la configuración
        contractual.
      operationId: createContractorNaturalPerson
      tags:
        - Gestión de contratista persona natural
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                contractor:
                  type: object
                  description: >
                    Datos del contratista. Para actualizar, enviar únicamente el
                    campo rut (Solo se permite actualizar documentos).

                    Debe usarse contractorTypeId=2 para contratista persona
                    natural.
                  properties:
                    contractorTypeId:
                      type: number
                      description: >-
                        ID del tipo de contratista. Para este flujo debe ser "2"
                        (Persona natural).
                    rut:
                      type: string
                      description: >-
                        RUT del contratista para crear o actualizar en formato
                        con guiones sin puntos.
                    name:
                      type: string
                      description: Nombre del contratista persona natural.
                    lastName:
                      type: string
                      description: Apellido paterno del contratista persona natural.
                    mothersLastName:
                      type: string
                      description: Apellido materno del contratista persona natural.
                    serviceTypeId:
                      type: number
                      description: |
                        ID del tipo de servicio del contratista.
                        - Tipo "1" para Monitoreo: Revisión periódica.
                        - Tipo "2" para Prospecto: Revisión única.
                    reviewStartDate:
                      type: string
                      format: date-time
                      description: Fecha de inicio de la review en formato ISO 8601.
                    reviewEndDate:
                      type: string
                      format: date-time
                      description: Fecha de fin de la review en formato ISO 8601.
                    reviewCompaniesId:
                      type: array
                      items:
                        type: integer
                      description: >-
                        IDs de empresas de revisión asociadas. Enviar arreglo
                        vacío si no aplica.
                  required:
                    - contractorTypeId
                    - rut
                    - serviceTypeId
                    - reviewStartDate
                    - reviewEndDate
                  example:
                    contractorTypeId: 2
                    rut: 22222222-2
                    name: Nombre Dummy
                    lastName: Apellido
                    mothersLastName: Demo
                    serviceTypeId: 1
                    reviewStartDate: '2025-01-13T02:59:00.000Z'
                    reviewEndDate: '2027-01-13T02:59:00.000Z'
                    reviewCompaniesId: []
                contractorPartner:
                  type: object
                  description: Datos de la contraparte asociada al contratista.
                  properties:
                    rut:
                      type: string
                      description: >-
                        RUT de la contraparte asociado al contratista. Formato
                        con guiones sin puntos.
                    name:
                      type: string
                      description: Nombre de la contraparte asociado al contratista.
                    lastName:
                      type: string
                      description: >-
                        Apellido de la contraparte asociado al contratista. Se
                        requieren ambos apellidos.
                    email:
                      type: string
                      description: Correo de la contraparte asociado al contratista.
                    phoneNumber:
                      type: string
                      description: Telefono de la contraparte asociado al contratista.
                  required:
                    - rut
                    - name
                    - lastName
                    - email
                    - phoneNumber
                  example:
                    rut: 22222222-2
                    name: Nombre
                    lastName: Dummy Demo
                    email: dummy.np@testia.cl
                    phoneNumber: '+56911111111'
                metadata:
                  description: Metadatos relacionados con los documentos del contratista.
                  type: array
                  items:
                    type: object
                    properties:
                      fileName:
                        type: string
                        description: Nombre del documento a subir.
                      side:
                        type: string
                        description: >-
                          Side puede ser "frontal" o "trasera". Solo para carnet
                          de identidad y licencia de conducir cuando sea de tipo
                          contratista "2" (Persona natural).
                      documentType:
                        type: number
                        description: |
                          Identificador del tipo de documento a cargar.
                          - Para persona natural:
                            - "30" Cedula de Identidad
                            - "31" Licencia de conducir
                            - "32" Certificado de Antecedentes
                            - "33" Hoja de vida del conductor
                          Regla de obligatoriedad:
                            - Depende del contrato: puede ser obligatorio o deseable.
                      documentEntity:
                        type: number
                        description: |
                          Identificador del tipo de documento a cargar.
                          - Para persona natural:
                            - "1" Contratista.
                    required:
                      - fileName
                      - documentType
                  example:
                    - fileName: cedula_dummy_frontal.jpeg
                      documentType: 30
                      side: frontal
                    - fileName: cedula_dummy_trasera.jpeg
                      documentType: 30
                      side: trasera
                    - fileName: licencia_dummy_frontal.jpeg
                      documentType: 31
                      side: frontal
                    - fileName: licencia_dummy_trasera.jpeg
                      documentType: 31
                      side: trasera
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: >-
                    Los nombres y cantidad de los archivos deben coincidir con
                    la metadata.
                  example:
                    - cedula_dummy_frontal.jpeg
                    - cedula_dummy_trasera.jpeg
                    - licencia_dummy_frontal.jpeg
                    - licencia_dummy_trasera.jpeg
              required:
                - contractor
                - contractorPartner
        required: true
      responses:
        '201':
          description: Solicitud recibida y en procesamiento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
              examples:
                persona_natural:
                  summary: Ejemplo exitoso persona natural
                  value:
                    statusCode: 201
                    message: Contratista persona natural creado correctamente
          headers: {}
        '400':
          description: >-
            Payload inválido o incompleto (ejemplo: falta rut, name, lastName,
            contractorPartner, peso excesivo, etc).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                header_companyid_requerido:
                  summary: Header x-consumer-custom-id ausente
                  value:
                    statusCode: 400
                    message: Header companyId es requerido
                    error: Bad Request
                error_interno_guard:
                  summary: Error interno al validar contrato/empresa
                  value:
                    statusCode: 400
                    message: Error interno, intente nuevamente
                    error: Bad Request
                sin_rut:
                  summary: Falta campo rut
                  value:
                    statusCode: 400
                    message: Campo rut es obligatorio
                    error: ValidationError
                sin_name:
                  summary: Falta campo name
                  value:
                    statusCode: 400
                    message: Campo name es obligatorio
                    error: ValidationError
                payload_invalido:
                  summary: Payload inválido o incompleto
                  value:
                    statusCode: 400
                    message: Payload inválido o incompleto
                    error: ValidationError
                sin_contractorPartner:
                  summary: Falta campo contractorPartner
                  value:
                    statusCode: 400
                    message: Campo contractorPartner es obligatorio
                    error: ValidationError
                peso_excesivo:
                  summary: Archivo adjunto excede el tamaño permitido
                  value:
                    statusCode: 400
                    message: Tamaño máximo de archivo excedido
                    error: PayloadTooLarge
                metadata_files_mismatch:
                  summary: Cantidad de archivos no coincide con metadata
                  value:
                    statusCode: 400
                    timestamp: '2026-05-20T13:02:53.690Z'
                    path: /request/contractor@natural-person
                    message: La cantidad de archivos debe ser igual que metadatos
                    errorType: Bad Request
          headers: {}
        '401':
          description: API key ausente o invalida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
              examples:
                no_autorizado:
                  summary: API key ausente o invalida
                  value:
                    message: Unauthorized
                    request_id: fd49b7506711ab474ebb396eb7d07c45
          headers: {}
