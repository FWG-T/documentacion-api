        natural ya registrado. Para realizar la actualización, se debe enviar el
        RUT del contratista y los nuevos documentos a cargar. La correspondencia
        entre los metadatos y los documentos adjuntos debe ser exacta.
      operationId: updateContractorNaturalPersonFilesDoc
      tags:
        - Gestión de contratista persona natural
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                contractor:
                  type: object
                  description: >-
                    Datos mínimos para actualizar documentos de un contratista
                    persona natural ya registrado.
                  properties:
                    rut:
                      type: string
                      description: RUT del contratista en formato con guiones sin puntos.
                  required:
                    - rut
                  example:
                    rut: 22222222-2
                metadata:
                  description: >-
                    Metadatos relacionados con los documentos del contratista
                    persona natural.
                  type: array
                  items:
                    type: object
                    properties:
                      fileName:
                        type: string
                        description: Nombre del documento a subir.
                      side:
                        type: string
                        description: >-
                          Side puede ser "frontal" o "trasera" para documentos
                          de identidad/licencia.
                      documentType:
                        type: number
                        description: >
                          Identificador del tipo de documento a cargar para
